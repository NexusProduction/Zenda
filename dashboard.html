<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Dashboard — Zenda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234F46E5'/><text x='16' y='23' font-size='22' font-family='sans-serif' font-weight='900' fill='white' text-anchor='middle'>Z</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    /* =========================================
       ZENDA DASHBOARD — PERFECTED ARCHITECTURE
       ========================================= */
    *, *::before, *::after { box-sizing: border-box; }
    @keyframes spin { to { transform: rotate(360deg); } }

    :root {
      --bd-color: #CBD5E1 !important; 
      --bd-subtle: rgba(15, 23, 42, 0.08);
      --bg-surface: #FFFFFF;
      --bg-raised: #F8FAFC;
      --tx-main: #0F172A;
      --tx-muted: #64748B;
      --ac: #3A57E8;
      --ac-hover: #2A41C7;
      --ac-light: #EEF2FF;
      --danger: #EF4444;
      --danger-light: #FEF2F2;
      --success: #10B981;
      --shadow-sm: 0 4px 12px rgba(15, 23, 42, 0.03);
      --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.06);
      --shadow-float: 0 24px 64px rgba(15, 23, 42, 0.12);
      --rad-outer: 24px;
      --rad-inner: 12px;
      --font-mono: 'DM Mono', monospace;
    }

    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FAFAFA; color: var(--tx-main); overflow-x: hidden; -webkit-font-smoothing: antialiased; margin: 0; }
    
    /* ── Typography & Accents ── */
    .greeting-name { color: var(--ac); font-weight: 800; }
    .page-ttl { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 4px; }
    .page-sub { font-size: 0.95rem; font-weight: 500; color: var(--tx-muted); }
    .content-ttl { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em; }
    .chart-hdr, .content-hdr { padding: 16px 20px; border-bottom: 1px solid var(--bd-subtle); display: flex; justify-content: space-between; align-items: center; }
    
    /* ── Inputs & Forms ── */
    .form-group { margin-bottom: 16px; }
    .form-input, .zenda-select, textarea.form-input { 
      border-radius: 10px; border: 1px solid var(--bd-color); background: var(--bg-raised);
      padding: 10px 14px; font-family: inherit; width: 100%; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; color: var(--tx-main);
    }
    .form-input:focus, .zenda-select:focus, textarea.form-input:focus { border-color: var(--ac); box-shadow: 0 0 0 3px rgba(58, 87, 232, 0.15); outline: none; background: var(--bg-surface); }
    .form-label { font-size: 0.8rem; font-weight: 700; color: var(--tx-muted); margin-bottom: 6px; display: block; }

    /* Profile Locked State */
    .prof-input-readonly {
      background: var(--bg-raised) !important;
      border: 1px solid var(--bd-subtle) !important;
      color: var(--tx-main) !important;
      font-weight: 700 !important;
      pointer-events: none;
    }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 24px; border-radius: 100px; font-size: 0.875rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; font-family: inherit; }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: var(--ac); color: white; box-shadow: 0 4px 14px rgba(58, 87, 232, 0.25); }
    .btn-primary:hover { background: var(--ac-hover); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(58, 87, 232, 0.35); }
    .btn-secondary { background: var(--bg-raised); color: var(--tx-muted); }
    .btn-secondary:hover { background: var(--bd-color); color: var(--tx-main); }
    .btn-danger { background: var(--danger-light); color: var(--danger); font-weight: 800; border: 1px solid rgba(239,68,68,0.2); }
    .btn-danger:hover { background: var(--danger); color: white; }
    .btn-ghost { background: transparent; color: var(--tx-muted); font-weight: 700; font-size: 0.85rem; border: 1.5px solid var(--bd-subtle); border-radius: 8px; padding: 6px 14px; transition: all 0.2s; }
    .btn-ghost:hover { background: var(--bg-raised); color: var(--tx-main); border-color: var(--bd-color); }
    .btn-delete-big { background: var(--danger-light); color: var(--danger); border: 1px solid rgba(239,68,68,.2); border-radius: 8px; width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; flex-shrink: 0; }
    .btn-delete-big:hover { background: var(--danger); color: white; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(239,68,68,.25); }
    .w-full { width: 100%; }

    /* ── BULLETPROOF OVERLAY & PANEL ARCHITECTURE ── */
    /* This permanently fixes the invisible unclickable button issue */
    .panel-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.45); z-index: 998; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .panel-overlay.visible { opacity: 1; pointer-events: auto; }

    .side-panel, .profile-side-panel, .fullpage, .notif-panel, .modal-overlay { visibility: hidden; pointer-events: none; }
    .side-panel.open, .profile-side-panel.open, .fullpage.open, .notif-panel.open, .modal-overlay.open { visibility: visible; pointer-events: auto; }

    .side-panel, .profile-side-panel { position: fixed; top: 0; right: 0; width: 400px; height: 100vh; background: var(--bg-surface); box-shadow: var(--shadow-float); z-index: 1000; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.4s; display: flex; flex-direction: column; }
    .side-panel.open, .profile-side-panel.open { transform: translateX(0); }
    .sp-hdr { padding: 20px 24px; border-bottom: 1px solid var(--bd-subtle); display: flex; justify-content: space-between; align-items: center; }
    .sp-ttl { font-size: 1.1rem; font-weight: 800; color: var(--tx-main); letter-spacing: -0.02em; }
    .sp-body { flex: 1; overflow-y: auto; background: var(--bg-page); }

    .fullpage { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--bg-page); z-index: 1001; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.4s; display: flex; flex-direction: column; }
    .fullpage.open { transform: translateY(0); }
    .fp-hdr { padding: 16px 20px; display: flex; align-items: center; border-bottom: 1px solid var(--bd-subtle); gap: 16px; background: var(--bg-surface);}
    .fp-back { background: transparent; border: none; font-weight: 700; font-size: 0.95rem; color: var(--tx-muted); display: flex; align-items: center; gap: 4px; cursor: pointer; transition: color 0.2s; font-family: inherit;}
    .fp-back:hover { color: var(--tx-main); }
    .fp-ttl { font-size: 1.2rem; font-weight: 800; color: var(--tx-main); letter-spacing: -0.02em; }
    .fp-body { flex: 1; overflow-y: auto; }

    #create-staff-page { width: 55%; left: auto; right: 0; border-radius: 32px 0 0 32px; box-shadow: var(--shadow-float); transform: translateX(100%); }
    #create-staff-page.open { transform: translateX(0); }

    /* ── Top 1% Notification Panel ── */
    .notif-panel { position: absolute; top: 72px; right: 24px; width: 400px; height: auto; max-height: calc(100vh - 100px); background: var(--bg-surface); border-radius: var(--rad-outer); box-shadow: var(--shadow-float); border: 1px solid var(--bd-subtle); z-index: 1000; transform-origin: top right; transform: scale(0.95); opacity: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.3s; display: flex; flex-direction: column; }
    .notif-panel.open { transform: scale(1); opacity: 1; }
    .notif-card { padding: 16px 20px; border-bottom: 1px solid var(--bd-subtle); display: flex; gap: 16px; transition: background 0.2s; align-items: flex-start; background: var(--bg-surface); }
    .notif-card:hover { background: var(--bg-raised); }
    .notif-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .notif-icon.security { background: var(--danger-light); color: var(--danger); }
    .notif-icon.task { background: var(--ac-light); color: var(--ac); }
    .notif-icon.general { background: var(--bg-raised); color: var(--tx-muted); }
    .notif-content-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .notif-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .notif-title { font-family: inherit; font-size: 0.95rem; color: var(--tx-main); font-weight: 800; margin: 0; line-height: 1.2; letter-spacing: -0.01em;}
    .notif-time { font-size: 0.7rem; color: var(--tx-muted); font-family: var(--font-mono); white-space: nowrap; font-weight: 600;}
    .notif-body { font-size: 0.85rem; color: var(--tx-muted); margin: 0; line-height: 1.4; font-weight: 500;}

    /* ── Modals ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.45); z-index: 1002; display: flex; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); opacity: 0; transition: opacity 0.3s, visibility 0.3s; }
    .modal-overlay.open { opacity: 1; }
    .modal-overlay .modal { transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal { background: var(--bg-surface); width: 100%; max-width: 440px; border-radius: var(--rad-outer); box-shadow: var(--shadow-float); overflow-y: auto; max-height: 90vh; }
    .modal-hdr { padding: 20px 24px; border-bottom: 1px solid var(--bd-subtle); display: flex; justify-content: space-between; align-items: center; }
    .modal-ttl { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.02em; }
    .modal-close { background: var(--bg-raised); border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--tx-muted); transition: all 0.2s; }
    .modal-close:hover { background: var(--danger-light); color: var(--danger); transform: rotate(90deg); }

    .toast.out { animation: toastOut .3s forwards; }
    .anim-stagger { opacity: 0; animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(24px); } 100% { opacity: 1; transform: translateY(0); } }

    .team-card { padding: 16px; border-radius: 16px; transition: transform 0.2s, box-shadow 0.2s; position: relative; background: var(--bg-surface); border: 1px solid var(--bd-color); box-shadow: var(--shadow-sm); cursor: pointer; }
    .team-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--ac); }
    .team-card-top { margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    .team-profile-info { display: flex; align-items: center; gap: 12px; }
    .team-av { display: flex; align-items: center; justify-content: center; flex-shrink: 0; border-radius: 50%; font-weight: 700; width: 44px; height: 44px;}
    .team-text-block { display: flex; flex-direction: column; justify-content: center; }
    .team-name { font-weight: 800; font-size: 1.05rem; color: var(--tx-main); letter-spacing: -0.01em;}
    .team-role { font-size: 0.75rem; font-weight: 700; color: var(--ac); background: var(--ac-light); display: inline-block; padding: 2px 8px; border-radius: 100px; margin-top: 4px; width: fit-content;}
    .team-card-actions { padding-top: 12px; border-top: 1px solid var(--bd-subtle); display: flex; justify-content: space-between; align-items: center;}

    .premium-task-card { margin-bottom: 12px; width: 100%; box-sizing: border-box; background: var(--bg-surface); border: 1px solid var(--bd-color); border-radius: var(--rad-inner); padding: 16px; display: flex; gap: 16px; align-items: flex-start; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: var(--shadow-sm);}
    .premium-task-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--ac); }
    .card-title { font-weight: 800; font-size: 1rem; color: var(--tx-main); margin-bottom: 6px; letter-spacing: -0.01em; }
    .card-date-top { display: flex; align-items: center; gap: 4px; }
    .card-date-bottom { display: none; align-items: center; gap: 5px; font-size: .72rem; color: var(--tx-muted); font-weight: 600; margin-top: 5px; }
    .card-date-bottom svg { flex-shrink: 0; }
    .task-declined .card-date-top { display: none !important; }
    .task-declined .card-date-bottom { display: flex !important; }
    .task-delete-inline { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 8px; border: 1px solid rgba(239,68,68,.25); background: var(--danger-light); color: var(--danger); font-size: .7rem; font-weight: 800; cursor: pointer; flex-shrink: 0; white-space: nowrap; transition: all .2s; margin-left: 8px; font-family: inherit;}
    .task-delete-inline:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    .tasks-page-hdr { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 24px; padding: 0 4px; }
    .tasks-page-hdr h1 { margin: 0; }
    #assign-tasks-btn-full { display: flex; align-items: center; gap: 8px; background: var(--ac); color: white; border: none; border-radius: 100px; padding: 10px 24px; font-size: .9rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 14px rgba(58, 87, 232, 0.3); transition: all .2s; white-space: nowrap; flex-shrink: 0; }
    #assign-tasks-btn-full:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(58, 87, 232, 0.4); }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .sc-ico { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0 !important; }
    .sc-ico svg { flex-shrink: 0 !important; min-width: 24px; min-height: 24px; }
    .sc-info { flex: 1; min-width: 0; }
    .sc-info .sc-lbl { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; color: var(--tx-muted); font-size: 0.85rem;}

    .content-row { display: flex; flex-direction: column; gap: 20px; }
    .apps-wrap-order { order: 0; }
    .recent-wrap-order { order: 1; }
    .apps-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; align-content: flex-start; padding: 16px; }
    .app-squircle { width: 60px; height: 60px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; transition: transform .3s cubic-bezier(.34,1.56,.64,1); box-shadow: var(--shadow-sm); }
    .app-squircle-wrap:hover .app-squircle { transform: scale(1.08) translateY(-4px); box-shadow: var(--shadow-md); }
    .app-squircle-wrap { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 4px; }
    .app-name { font-family: inherit; font-size: .75rem; font-weight: 700; color: var(--tx-muted); text-align: center; line-height: 1.2; }
    .app-viewall-tile { width: 60px; height: 60px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; background: linear-gradient(135deg,#EEF2FF,#E0E7FF); border: 2px dashed #A5B4FC; transition: all .2s; }
    .app-squircle-wrap:hover .app-viewall-tile { background: linear-gradient(135deg,#E0E7FF,#C7D2FE); border-color: var(--ac); transform: translateY(-4px); }

    /* ════════════════════════════   TABLET & DESKTOP  ════════════════════════════ */
    @media (min-width: 769px) and (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
      .content-row { flex-direction: row; flex-wrap: wrap; }
      .content-row .content-card { flex: 1; min-width: 280px; }
      .apps-wrap-order { order: 1; }
      .recent-wrap-order { order: 0; }
      #create-staff-page { width: 75%; }
    }

    @media (min-width: 1025px) {
      .stats-grid, .content-row, #task-tab-row, #tasks-list, .team-grid { padding-left: 16px; padding-right: 16px; }
      .content-row { flex-direction: row; gap: 24px; align-items: flex-start; }
      .recent-wrap-order { order: 0; flex: 1.6; height: 440px; min-height: 440px; max-height: 440px; overflow: hidden; display: flex; flex-direction: column; padding-bottom: 0 !important; }
      #recent-tasks { flex: 1; overflow-y: auto; scrollbar-width: none; padding: 0 4px; }
      #recent-tasks::-webkit-scrollbar { display: none; }
      #recent-tasks .task-list-wrapper { padding-bottom: 4px !important; }
      .apps-wrap-order { order: 1; flex: 1; height: 440px; min-height: 440px; max-height: 440px; overflow: hidden; display: flex; flex-direction: column; padding-bottom: 0 !important; }
      .apps-wrap .apps-grid { overflow-y: auto; scrollbar-width: none; }
      .apps-wrap .apps-grid::-webkit-scrollbar { display: none; }

      .team-card { flex-direction: column !important; align-items: center !important; text-align: center !important; padding: 24px 16px !important; }
      .team-card-top { flex-direction: column !important; justify-content: center !important; gap: 12px; width: 100%; margin-bottom: 16px !important; }
      .team-profile-info { flex-direction: column !important; gap: 8px !important; }
      .team-text-block { align-items: center !important; }
      .team-card-actions { flex-direction: column !important; gap: 12px; align-items: center !important; border-top: none !important; padding-top: 0 !important; width: 100%; justify-content: center !important; }
      .team-email { justify-content: center !important; }
      .btn-delete-big { position: absolute; top: 12px; right: 12px; }
    }

    /* ════════════════════════════   MOBILE STRICT RESPONSIVENESS FIX ════════════════════════════ */
    @media (max-width: 768px) {
      html, body { max-width: 100vw; overflow-x: hidden; }
      .app-body, .main-content { width: 100%; max-width: 100vw; overflow-x: hidden; min-width: 0; padding-left: 0 !important; padding-right: 0 !important; }
      .page-hdr { padding-left: 16px !important; padding-right: 16px !important; margin-bottom: 24px !important; }
      .stats-grid { grid-template-columns: 1fr 1fr !important; gap: 12px !important; padding-left: 16px !important; padding-right: 16px !important; }
      .stats-grid .stat-card:first-child { grid-column: 1 / -1 !important; }
      .apps-wrap-order { order: 0; }
      .recent-wrap-order { order: 1; }
      
      /* ── PERFECT ALIGNMENT: App Wrap Padding matched exactly to Content Card ── */
      .content-card { padding: 20px !important; width: 100% !important; margin: 0 0 16px 0 !important; box-sizing: border-box !important; border-radius: var(--rad-outer) !important;}
      .apps-wrap { padding: 20px !important; }
      
      /* Unified Header Padding */
      .content-hdr { padding: 0 0 12px 0 !important; margin-bottom: 16px !important; border-bottom: 1px solid var(--bd-subtle) !important; }

      .stats-grid, .content-row, #task-tab-row, #tasks-list, .team-grid { padding-left: 16px !important; padding-right: 16px !important; width: 100% !important; box-sizing: border-box !important;}
      
      #recent-tasks { width: 100% !important; padding: 0 !important; overflow: hidden !important; }
      #recent-tasks .premium-task-card { width: 100% !important; margin: 0 0 12px 0 !important; box-sizing: border-box !important; }
      
      .apps-grid { grid-template-columns: repeat(4, 1fr) !important; gap: 8px !important; width: 100% !important; padding: 0 !important; }
      .app-squircle, .app-viewall-tile { width: 52px !important; height: 52px !important; border-radius: 14px !important; margin: 0 auto 8px !important; }
      .app-squircle svg { width: 24px !important; height: 24px !important; }
      .app-name { font-size: .7rem !important; word-wrap: break-word; }
      
      .card-date-top { display: none !important; }
      .card-date-bottom { display: flex !important; }
      
      /* Hide Top Button on mobile */
      #assign-top-btn { display: none !important; }
      
      /* Show Assign Task on My Tasks Page Mobile */
      #assign-tasks-btn-full { display: flex !important; padding: 10px 16px !important; font-size: 0.8rem !important; }
      .topbar-right .profile-btn { display: none !important; }
      .tasks-page-hdr { padding-left: 16px !important; padding-right: 16px !important; }
      
      #create-staff-page { width: 100% !important; border-radius: 24px 24px 0 0 !important; top: 40px !important; height: calc(100vh - 40px) !important; box-shadow: 0 -10px 40px rgba(0,0,0,0.15) !important; transform: translateY(100%); }
      #create-staff-page.open { transform: translateY(0); }
      #create-staff-page .fp-hdr { padding: 20px 24px 16px !important; }
      #create-staff-page .fp-body { padding: 0 24px 24px !important; }
      #create-staff-page .form-section { padding: 20px !important; border-radius: 12px !important; margin-bottom: 16px !important; }
      #create-staff-page .form-row { grid-template-columns: 1fr !important; gap: 16px !important; }

      .team-card { padding: 16px !important; }
      #task-tab-row { overflow-x: auto; scrollbar-width: none; white-space: nowrap; padding-bottom: 4px; padding-left: 16px !important;}
      #task-tab-row::-webkit-scrollbar { display: none; }

      /* ── 4-TAB FLOATING PILL BOTTOM NAV (Active proper card look) ── */
      .bottom-nav { position: fixed !important; bottom: 24px !important; left: 16px !important; right: 16px !important; height: 68px !important; background: #ffffff !important; border-radius: 32px !important; box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.08) !important; display: flex !important; align-items: center !important; padding: 0 12px !important; z-index: 900 !important; border: 1px solid rgba(226, 232, 240, 0.6) !important; }
      .bn-items { display: flex !important; width: 100% !important; justify-content: space-around !important; align-items: center !important; }
      .bn-item { flex: 1 !important; display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important; gap: 4px !important; color: var(--tx-muted) !important; background: transparent !important; border: none !important; min-height: 52px !important; cursor: pointer !important; padding: 6px 12px; border-radius: 18px; transition: all 0.2s; }
      .bn-item span:not(.bn-dot) { font-family: inherit !important; font-size: 11px !important; font-weight: 600 !important; }
      
      /* New Premium active state */
      .bn-item.active { background: var(--ac-light) !important; color: var(--ac) !important; font-weight: 800 !important; }
      .bn-item.active svg { stroke: var(--ac) !important; }

      .app-body, .main-content { padding-bottom: 110px !important; }
      .notif-panel { width: calc(100% - 32px); right: 16px; left: 16px; top: 80px; height: auto; max-height: calc(100vh - 120px); border-radius: 24px; border: none; transform: translateY(-20px) scale(0.95); }
      .notif-panel.open { transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>

  <script type="module">
    import { auth, db, EMAILJS_CONFIG } from './firebase-config.js';
    import { requireAuth, logout, getCurrentUser } from './auth.js';
    import { listenNotifications, markAllRead as markAllReadFn } from './notifications.js';
    import { listenMyTasks, listenAssignedByMe, assignTask, markTaskDone, markTaskDeclined } from './tasks.js';
    import { listenCompanyStaff, getAssignableStaff, createStaff, deleteStaffMember } from './staff.js';
    import { listenInstalledApps } from './apps.js';
    import { showToast, getInitials, avatarColor, formatRole, copyToClipboard, saveSession } from './utils.js';
    import { doc, getDoc, deleteDoc, updateDoc, addDoc, collection, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { updateProfile, updateEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { sendOTP, verifyUserOTP } from './otp.js';

    // Global Functions Bound Immediately
    window.copyToClipboard = copyToClipboard;
    window.showToast = showToast;
    window.CU = null;
    window.myTasks = [];
    window.assignedByMeTasks = [];
    window.taskTab = 'pending';
    let allStaff = [];
    let _profileBuilt = false;
    let deleteTargetUid = null, deleteConfirmStr = '', deleteTargetEmail = '', deleteTargetPwd = '';
    let pendingDeclineId = null, deleteTaskTargetId = null, mainAreaChart = null, unsubs = [], _lastCreatedStaff = {};

    function loadBtn(btn, loading, restoreText) {
      if (!btn) return;
      if (loading) {
        btn._origHTML = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<span style="width:16px;height:16px;border:3px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;display:inline-block;animation:spin .6s linear infinite;vertical-align:middle;"></span>`;
      } else {
        btn.disabled = false;
        if (restoreText) btn.textContent = restoreText;
        else if (btn._origHTML) btn.innerHTML = btn._origHTML;
      }
    }
    
    function esc(s = '') { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function setBadge(id, n) { const el = document.getElementById(id); if (!el) return; el.textContent = n > 99 ? '99+' : n; el.classList.toggle('hidden', n <= 0); }
    function setDot(id, show) { const el = document.getElementById(id); if (el) el.classList.toggle('show', show); }
    function ago(iso) { if (!iso) return ''; const d = Date.now() - new Date(iso); if (d < 60000) return 'just now'; if (d < 3600000) return Math.floor(d / 60000) + 'm ago'; if (d < 86400000) return Math.floor(d / 3600000) + 'h ago'; return Math.floor(d / 86400000) + 'd ago'; }
    function last7() { const o = []; for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); o.push({ label: d.toLocaleDateString('en-US', { weekday: 'short' }), date: d.toDateString() }); } return o; }
    function fmtDate(v) { if (!v) return ''; const d = new Date(v); if (isNaN(d)) return v; const m = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']; return `${String(d.getDate()).padStart(2,'0')} ${m[d.getMonth()]} ${d.getFullYear()}`; }
    function formatDateIN(ts) { if (!ts) return '—'; const d = new Date(ts); return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }); }

    // ── BULLETPROOF PANELS LOGIC ──
    window.closeAllPanels = function(skipDropdown = false) {
        document.querySelectorAll('.side-panel, .profile-side-panel, .fullpage, .modal-overlay').forEach(p => {
            p.classList.remove('open');
        });
        
        if (!skipDropdown) {
            const notif = document.getElementById('notificationDropdown');
            if (notif) notif.classList.remove('open');
        }
        
        const overlay = document.getElementById('panel-overlay');
        if (overlay) overlay.classList.remove('visible');
    };

    window.toggleNotifDropdown = function(e) {
        if(e) e.stopPropagation();
        const panel = document.getElementById('notificationDropdown');
        if (!panel) return;
        
        const isCurrentlyOpen = panel.classList.contains('open');
        
        window.closeAllPanels(true); // Close everything ELSE
        
        if (!isCurrentlyOpen) {
            panel.classList.add('open');
            document.getElementById('panel-overlay')?.classList.add('visible');
        } else {
            panel.classList.remove('open');
            document.getElementById('panel-overlay')?.classList.remove('visible');
        }
    };

    window.showView = function(v) {
        window.closeAllPanels(); 
        ['home', 'tasks', 'staff'].forEach(n => { 
            const el = document.getElementById('view-' + n);
            if (el) {
                if (n === v) { el.classList.remove('hidden'); el.classList.add('fade-in-section'); }
                else { el.classList.add('hidden'); el.classList.remove('fade-in-section'); }
            }
        });
        const bnMap = { home: 'bn-home', tasks: 'bn-tasks', staff: 'bn-staff-btn' };
        Object.values(bnMap).forEach(id => document.getElementById(id)?.classList.remove('active'));
        if (bnMap[v]) document.getElementById(bnMap[v])?.classList.add('active');
        if (v === 'tasks') window.renderTasksList();
    };

    window.openProfile = function() { 
        if (!_profileBuilt) { window.buildProfile(); _profileBuilt = true; } 
        window.closeAllPanels();
        
        if (window.innerWidth >= 769) { 
            document.getElementById('profile-side-panel')?.classList.add('open'); 
        } else { 
            document.getElementById('profile-page-mobile')?.classList.add('open'); 
        } 
        document.getElementById('panel-overlay')?.classList.add('visible'); 
    };

    window.openModal = function(id) { 
        window.closeAllPanels(); 
        const el = document.getElementById(id); 
        if (el) el.classList.add('open'); 
        document.getElementById('panel-overlay')?.classList.add('visible'); 
    };
    
    window.closeModal = function(id) { 
        const el = document.getElementById(id); 
        if (el) el.classList.remove('open'); 
        document.getElementById('panel-overlay')?.classList.remove('visible'); 
    };

    window.openCreateStaffPage = function() {
        window.closeAllPanels();
        const panel = document.getElementById('create-staff-page');
        if (panel) panel.classList.add('open');
        document.getElementById('panel-overlay')?.classList.add('visible');
    };

    // ── NOTIFICATION RENDERING ──
    window.renderNotifs = function(items) {
        const el = document.getElementById('notif-body');
        if (!el) return;
        
        const activeNotifs = items.filter(n => n.status !== 'read' && n.read !== true);
        const topBadge = document.getElementById('notif-badge');
        const innerBadge = document.getElementById('notif-count-badge');
        
        if (!activeNotifs.length) { 
            el.innerHTML = `<div class="empty" style="padding:40px 20px; text-align:center;"><div class="empty-ico" style="margin-bottom:12px; display:flex; justify-content:center;"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--tx-muted)" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div><div class="empty-ttl" style="color:var(--tx-muted); font-size:14px; font-weight:600;">No notifications</div></div>`; 
            if (topBadge) { topBadge.classList.add('hidden'); topBadge.textContent = '0'; }
            if (innerBadge) { innerBadge.classList.add('hidden'); innerBadge.textContent = '0'; }
            return; 
        }
        
        if (topBadge) { topBadge.classList.remove('hidden'); topBadge.textContent = activeNotifs.length; }
        if (innerBadge) { innerBadge.classList.remove('hidden'); innerBadge.textContent = activeNotifs.length; }
        
        el.innerHTML = '';
        activeNotifs.forEach(n => {
            if (n.type === 'security_login' || n.type === 'security_alert') {
                const tpl = document.getElementById('tpl-security').content.cloneNode(true);
                const card = tpl.querySelector('.notif-card');
                card.dataset.id = n.id;
                if (n.message) card.querySelector('.notif-body').textContent = n.message;
                card.querySelector('.notif-time').textContent = ago(n.createdAt);
                el.appendChild(tpl);
            } else if (n.type === 'task_received') {
                const tpl = document.getElementById('tpl-task').content.cloneNode(true);
                const card = tpl.querySelector('.notif-card');
                card.dataset.id = n.id;
                card.dataset.taskId = n.taskId || '';
                card.dataset.senderId = n.senderId || '';
                card.querySelector('.task-title').textContent = n.message || 'You have been assigned a new task.';
                card.querySelector('.notif-time').textContent = ago(n.createdAt);
                el.appendChild(tpl);
            } else {
                const div = document.createElement('div');
                div.className = 'notif-card';
                div.dataset.id = n.id;
                const timeStr = ago(n.createdAt);
                div.innerHTML = `
                <div class="notif-icon general"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
                <div class="notif-content-wrap">
                    <div class="notif-header"><h4 class="notif-title">Notification</h4><span class="notif-time">${timeStr}</span></div>
                    <p class="notif-body">${esc(n.message)}</p>
                    <div class="notif-actions" style="justify-content: flex-start;"><button class="btn-secondary" style="padding:6px 16px;" onclick="window.dismissAlert(this)">Mark as Read</button></div>
                </div>`;
                el.appendChild(div);
            }
        });
    };

    window.dismissAlert = async function(btn) { const card = btn.closest('.notif-card'); const id = card.dataset.id; btn.textContent = "Done!"; card.style.opacity = '0.5'; setTimeout(() => card.remove(), 300); try { await updateDoc(doc(db, 'users', window.CU.uid, 'notifications', id), { read: true, status: 'read' }); } catch(e) { console.error("Error marking read:", e); } };
    window.acceptTaskNotif = async function(btn) { const card = btn.closest('.notif-card'); const id = card.dataset.id; btn.textContent = "Accepted!"; card.style.opacity = '0.5'; setTimeout(() => card.remove(), 300); try { await updateDoc(doc(db, 'users', window.CU.uid, 'notifications', id), { read: true, status: 'read' }); } catch(e) { console.error("Error marking read:", e); } };
    window.showDenyInput = function(btn) { const card = btn.closest('.notif-card'); card.querySelector('.notif-actions').classList.add('hidden'); card.querySelector('.deny-container').classList.remove('hidden'); };
    window.submitDeny = async function(btn) { const card = btn.closest('.notif-card'); const input = card.querySelector('.deny-input').value.trim(); const wordCount = input.split(/\s+/).filter(word => word.length > 0).length; if (wordCount === 0 || wordCount > 10) { window.showToast("Please provide a reason between 1 and 10 words.", "error"); return; } const taskId = card.dataset.taskId; const managerId = card.dataset.senderId; const notifId = card.dataset.id; btn.textContent = "Sending..."; try { if (taskId) { await updateDoc(doc(db, 'tasks', taskId), { status: 'declined', reason: input }); } if (managerId) { await addDoc(collection(db, 'users', managerId, 'notifications'), { type: 'task_update', message: `Task denied. Reason: ${input}`, taskId: taskId, createdAt: Date.now(), read: false, status: 'unread' }); } if (notifId) { await updateDoc(doc(db, 'users', window.CU.uid, 'notifications', notifId), { read: true, status: 'read' }); } btn.textContent = "Done!"; card.style.opacity = '0.5'; setTimeout(() => card.remove(), 300); window.showToast("Task denied.", "success"); } catch(e) { console.error(e); window.showToast("Error updating task.", "error"); btn.textContent = "Send"; } };
    window.markAllRead = async function() { try { await markAllReadFn(window.CU?.uid); document.getElementById('notif-badge')?.classList.add('hidden'); document.getElementById('notif-count-badge')?.classList.add('hidden'); window.showToast('All marked read', 'success'); } catch (e) { console.error(e); } };

    // ── PROFILE MANAGEMENT ──
    window.uploadAvatar = function(e, suffix) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const dataUrl = event.target.result;
            localStorage.setItem('zenda_logo_' + window.CU.uid, dataUrl);
            window.CU.avatarData = dataUrl;
            document.querySelectorAll('.prof-av-display').forEach(el => { el.innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;">`; });
            const ini = getInitials(window.CU.name), col = avatarColor(window.CU.name);
            setAv('topbar-avatar', ini, col, 34, dataUrl);
            setAv('bn-avatar', ini, col, 24, dataUrl);
            updateDoc(doc(db, 'users', window.CU.uid), { avatarData: dataUrl });
        };
        reader.readAsDataURL(file);
    };

    window.enableProfileEdit = function(suffix) {
        ['name', 'email'].forEach(f => {
            const el = document.getElementById(`prof-${f}-${suffix}`);
            if(el) { 
              el.removeAttribute('readonly'); 
              el.classList.remove('prof-input-readonly'); 
            }
        });
        document.getElementById(`btn-save-prof-${suffix}`).style.display = 'flex';
        document.getElementById(`prof-name-${suffix}`)?.focus();
    };

    window.disableProfileEdit = function(suffix) {
        ['name', 'email'].forEach(f => {
            const el = document.getElementById(`prof-${f}-${suffix}`);
            if(el) { el.setAttribute('readonly', 'true'); el.classList.add('prof-input-readonly'); }
        });
        const saveBtn = document.getElementById(`btn-save-prof-${suffix}`);
        if(saveBtn) saveBtn.style.display = 'none';
    };

    window.pendingProfileUpdates = {};
    window.saveProfileData = async function(suffix) {
        const newName = document.getElementById('prof-name-' + suffix).value.trim();
        const newEmail = document.getElementById('prof-email-' + suffix).value.trim();
        if (!newName || !newEmail) return;

        let nameChanged = newName !== window.CU.name;
        let emailChanged = newEmail !== window.CU.email;

        if (!nameChanged && !emailChanged) {
            window.showToast('No changes made.', 'info');
            window.disableProfileEdit(suffix);
            return;
        }

        window.pendingProfileUpdates = { newName, newEmail, nameChanged, emailChanged, suffix };

        if (emailChanged) {
            window.showToast('Verifying current email...', 'info');
            try {
                await sendOTP(window.CU.email);
                window.openModal('email-otp-modal');
                document.getElementById('email-otp-step').textContent = 'Step 1: Verify Current Email';
                document.getElementById('email-otp-target').textContent = window.CU.email;
                window.emailOTPState = 'current';
            } catch(e) { window.showToast('Failed to send OTP: ' + e.message, 'error'); }
        } else {
            await window.commitProfileUpdates();
        }
    };

    window.verifyEmailChangeOTP = async function() {
        const otp = document.getElementById('email-otp-input').value;
        if (otp.length < 6) return window.showToast('Enter 6 digits', 'error');

        const btn = document.getElementById('btn-verify-email-otp');
        loadBtn(btn, true);
        try {
            if (window.emailOTPState === 'current') {
                const r = await verifyUserOTP(window.CU.email, otp);
                if (!r.success) throw new Error(r.message);
                
                window.emailOTPState = 'new';
                document.getElementById('email-otp-input').value = '';
                await sendOTP(window.pendingProfileUpdates.newEmail);
                document.getElementById('email-otp-step').textContent = 'Step 2: Verify New Email';
                document.getElementById('email-otp-target').textContent = window.pendingProfileUpdates.newEmail;
                window.showToast('Code sent to new email!', 'success');
            } else if (window.emailOTPState === 'new') {
                const r = await verifyUserOTP(window.pendingProfileUpdates.newEmail, otp);
                if (!r.success) throw new Error(r.message);
                
                window.closeModal('email-otp-modal');
                await window.commitProfileUpdates();
            }
        } catch(e) { window.showToast(e.message, 'error'); } 
        finally { loadBtn(btn, false, 'Verify Code'); }
    };

    window.commitProfileUpdates = async function() {
        const { newName, newEmail, nameChanged, emailChanged, suffix } = window.pendingProfileUpdates;
        const btn = document.getElementById('btn-save-prof-' + suffix);
        loadBtn(btn, true);

        try {
            const userRef = doc(db, 'users', window.CU.uid);
            const updates = {};
            const batch = writeBatch(db);

            if (nameChanged) {
                updates.name = newName;
                await updateProfile(auth.currentUser, { displayName: newName });
                window.CU.name = newName;
                
                const notifRef = doc(collection(db, 'users', window.CU.uid, 'notifications'));
                batch.set(notifRef, {
                    type: 'general',
                    message: 'Your profile name was successfully updated to ' + newName + '.',
                    createdAt: Date.now(), read: false, status: 'unread'
                });
            }
            if (emailChanged) {
                await updateEmail(auth.currentUser, newEmail);
                updates.email = newEmail;
                window.CU.email = newEmail;
                
                const notifRef = doc(collection(db, 'users', window.CU.uid, 'notifications'));
                batch.set(notifRef, {
                    type: 'security_login',
                    message: 'Your email address was successfully updated to ' + newEmail + '.',
                    createdAt: Date.now(), read: false, status: 'unread'
                });
            }

            await updateDoc(userRef, updates);
            await batch.commit();
            
            document.getElementById('topbar-name').textContent = newName.split(' ')[0];
            window.showToast('Profile updated successfully!', 'success');
            
            window.disableProfileEdit(suffix);
            window.buildProfile(); 
        } catch(e) {
            if(e.code === 'auth/requires-recent-login') { window.showToast('Please log out and log back in to change your email.', 'error'); } 
            else { window.showToast(e.message, 'error'); }
        } finally { loadBtn(btn, false, 'Save Changes'); }
    };

    window.buildProfile = function() {
      if (!window.CU) return;
      const { name, email, uniqueId, avatarData } = window.CU;
      const ini = getInitials(name);
      const bgC = avatarColor(name);
      const roleStr = (window.CU.role || 'user').toUpperCase();
      
      const avContent = avatarData ? `<img src="${avatarData}" style="width:100%;height:100%;object-fit:cover;">` : ini;
      const expDateStr = window.CU.subscriptionExpiry ? new Date(window.CU.subscriptionExpiry).toLocaleDateString() : 'Lifetime';
      
      const prmBadge = window.CU.isPremium 
         ? `<div style="margin: 16px auto 0; background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%); border-radius: 12px; padding: 12px 16px; color: white; box-shadow: var(--shadow-sm); border:1px solid rgba(255,255,255,0.1); display: inline-flex; flex-direction: column; align-items: center; justify-content: center; min-width: 200px;">
              <div style="font-weight: 800; font-size: 0.95rem; margin-bottom: 2px; display: flex; align-items: center; gap: 8px; color: #FBBF24; letter-spacing:-0.02em;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                Premium Active
              </div>
              <div style="font-size: 0.8rem; color: #94A3B8; font-weight:600;">Valid till ${expDateStr}</div>
            </div>`
         : ``;

      function getProfileHTML(suffix) {
          return `
            <div style="text-align:center;padding:32px 20px 24px;border-bottom:1px solid var(--bd-subtle); background: var(--bg-surface);">
              <div style="position:relative; width:96px; height:96px; margin:0 auto 16px;">
                  <div class="av prof-av-display" style="width:100%; height:100%; font-size:2.4rem; font-weight:800; border-radius:28px; background:${bgC}22; color:${bgC}; display:flex; align-items:center; justify-content:center; overflow:hidden; box-shadow: var(--shadow-md); border: 2px solid white;">
                      ${avContent}
                  </div>
                  <label for="avatar-upload-${suffix}" style="position:absolute; bottom:-4px; right:-4px; background:var(--ac); color:white; width:34px; height:34px; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:2px solid white; box-shadow:var(--shadow-sm); transition:transform 0.2s;">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  </label>
                  <input type="file" id="avatar-upload-${suffix}" accept="image/*" style="display:none;" onchange="window.uploadAvatar(event, '${suffix}')">
              </div>
              <div style="font-size:1.4rem;font-weight:800;color:var(--tx-main); letter-spacing:-0.03em;">${esc(name)}</div>
              <div style="font-size:0.85rem;color:var(--ac);font-weight:700;margin-top:4px;background:var(--ac-light);display:inline-block;padding:2px 10px;border-radius:100px;">${roleStr}</div>
              ${prmBadge}
            </div>
            <div style="padding:24px; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:1rem; font-weight:800; color:var(--tx-main); letter-spacing:-0.01em;">Account Details</span>
                <button class="btn btn-ghost" style="padding:6px 12px; border-radius:8px; font-size:0.8rem;" onclick="window.enableProfileEdit('${suffix}')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg> Edit
                </button>
            </div>
            <div style="padding:0 24px 24px; display:flex; flex-direction:column; gap:16px;">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="prof-name-${suffix}" class="form-input prof-input-readonly" value="${esc(name)}" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="prof-email-${suffix}" class="form-input prof-input-readonly" value="${esc(email)}" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">Zenda ID <span style="color:var(--tx-muted);font-weight:500;">(Read-only)</span></label>
                    <div style="background:var(--bg-raised); padding:10px 14px; border-radius:10px; border:1px solid var(--bd-subtle); font-family:var(--font-mono); font-size:0.95rem; font-weight:700; color:var(--tx-main); display:flex; justify-content:space-between; align-items:center;">
                        <span id="prof-uid-${suffix}">${uniqueId}</span>
                        <button class="btn btn-ghost" style="padding:4px 8px; background:white; border-radius:6px; border:1px solid var(--bd-subtle); font-size:0.75rem;" onclick="window.copyToClipboard('${uniqueId}'); window.showToast('ID Copied!', 'success');">Copy</button>
                    </div>
                </div>
                
                <button class="btn btn-primary w-full" id="btn-save-prof-${suffix}" style="display:none; margin-top:8px; padding:12px;" onclick="window.saveProfileData('${suffix}')">Save Changes</button>
                <button class="btn btn-danger w-full" style="margin-top:16px; padding:12px; background:var(--danger-light); color:var(--danger); border:1px solid rgba(239,68,68,0.2);" onclick="window.handleLogout()">Sign Out</button>
            </div>
          `;
      }
      
      const d = document.getElementById('profile-body-desktop');
      const m = document.getElementById('profile-body-mobile');
      if (d) d.innerHTML = getProfileHTML('desk');
      if (m) m.innerHTML = getProfileHTML('mob');
    };

    // ── TASK MANAGEMENT ──
    window.openDeleteTaskModal = function(id, title) { deleteTaskTargetId = id; document.getElementById('del-task-name-display').textContent = title; window.openModal('delete-task-modal'); };
    window.executeTaskDelete = async function() { if (!deleteTaskTargetId) return; const btn = document.getElementById('del-task-confirm-btn'); loadBtn(btn, true); const tEl = document.getElementById('task-' + deleteTaskTargetId); if (tEl) { tEl.style.opacity = '.4'; tEl.style.pointerEvents = 'none'; } try { await deleteDoc(doc(db, 'tasks', deleteTaskTargetId)); if (tEl) tEl.remove(); window.closeModal('delete-task-modal'); window.showToast('Task deleted.', 'success'); } catch (e) { if (tEl) { tEl.style.opacity = '1'; tEl.style.pointerEvents = ''; } window.showToast('Could not delete: ' + e.message, 'error'); } finally { loadBtn(btn, false, 'Delete Task'); deleteTaskTargetId = null; } };
    window.doAcceptTask = async function(id) { const el = document.getElementById('task-' + id); if (el) { const ti = el.querySelector('.card-title'); if (ti) ti.classList.add('done'); el.classList.add('completed-state'); el.querySelectorAll('button').forEach(b => b.style.display = 'none'); } const obj = (window.myTasks || []).find(t => t.id === id); if (obj) obj.status = 'done'; try { await markTaskDone(id); window.showToast('Task completed! 🎉', 'success'); } catch (e) { if (obj) obj.status = 'pending'; if (el) { el.classList.remove('completed-state'); const ti = el.querySelector('.card-title'); if (ti) ti.classList.remove('done'); el.querySelectorAll('button').forEach(b => b.style.display = 'block'); } window.showToast(e.message, 'error'); } };
    window.openDeclineModal = function(id, title) { pendingDeclineId = id; document.getElementById('decline-task-title').textContent = title; document.getElementById('decline-reason').value = ''; window.openModal('decline-modal'); };
    window.confirmDecline = async function() { const reason = document.getElementById('decline-reason').value.trim(); const btn = document.getElementById('confirm-decline-btn'); loadBtn(btn, true); try { await markTaskDeclined(pendingDeclineId, reason); window.closeModal('decline-modal'); window.showToast('Task declined.', ''); } catch (e) { window.showToast(e.message, 'error'); } loadBtn(btn, false, 'Decline Task'); };

    function buildAssignSelect(staff) { const sel = document.getElementById('assign-to'); if (!sel) return; sel.innerHTML = '<option value="">Select team member…</option>' + staff.filter(s => s.uid !== window.CU?.uid).map(s => `<option value="${s.uid}">${esc(s.name)}</option>`).join(''); }
    window.quickAssign = function(uid) { window.openAssignModal(); setTimeout(() => { const s = document.getElementById('assign-to'); if (s) s.value = uid; }, 50); };
    window.handleAssign = async function() { const to = document.getElementById('assign-to').value, title = document.getElementById('task-title').value.trim(), desc = document.getElementById('task-desc').value.trim(), date = document.getElementById('task-date').value, time = document.getElementById('task-time').value, priority = document.getElementById('task-priority')?.value || 'Medium'; if (!to) { window.showToast('Select a team member.', 'error'); return; } if (!title) { window.showToast('Enter a task title.', 'error'); return; } const btn = document.getElementById('assign-btn'); loadBtn(btn, true); try { const a = allStaff.find(s => s.uid === to); await assignTask({ title, description: desc, assignedTo: to, assignedToName: a?.name || 'Team Member', assignedBy: window.CU?.uid, assignedByName: window.CU?.name, companyId: window.CU?.companyId, dueDate: date || null, dueTime: time || null, priority }); window.closeModal('assign-modal'); window.showToast(`Assigned to ${a?.name}!`, 'success'); } catch (e) { window.showToast(e.message, 'error'); } loadBtn(btn, false, 'Assign Task'); };

    // ── STAFF MANAGEMENT ──
    window.openDeleteModal = function(uid, name, email, pwd) { deleteTargetUid = uid; deleteConfirmStr = name; deleteTargetEmail = email; deleteTargetPwd = pwd; document.getElementById('del-name-display').textContent = name; document.getElementById('del-confirm-hint').textContent = name; document.getElementById('del-confirm-input').value = ''; const b = document.getElementById('del-confirm-btn'); b.disabled = true; window.openModal('delete-modal'); };
    window.checkDelConfirm = function() { const v = document.getElementById('del-confirm-input').value, b = document.getElementById('del-confirm-btn'), ok = v === deleteConfirmStr; b.disabled = !ok; };
    window.confirmDelete = async function() { if (!deleteTargetUid) return; const btn = document.getElementById('del-confirm-btn'); loadBtn(btn, true); try { await deleteStaffMember(deleteTargetUid, deleteTargetEmail, deleteTargetPwd); window.closeModal('delete-modal'); window.showToast('Staff member removed.', 'success'); deleteTargetUid = null; } catch (e) { window.showToast('Error: ' + e.message, 'error'); loadBtn(btn, false, 'Delete'); window.checkDelConfirm(); } };

    // ── CORE INITIALIZATION ──
    async function init() {
      try {
        await requireAuth('login.html');
        const cu = await getCurrentUser();
        if (!cu) { location.href = 'login.html'; return; }
        window.CU = cu; saveSession(cu); window.CU._notifyList = cu.notifyApps || [];
        setupUI(); window.buildProfile(); subscribeAll();
      } catch (e) { console.error(e); } finally { hideLoader(); }
    }

    function hideLoader() { const el = document.getElementById('loading-overlay'); if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); } }

    function setupUI() {
      const { name, role } = window.CU;
      const col = avatarColor(name), ini = getInitials(name);
      const src = localStorage.getItem('zenda_logo_' + window.CU.uid) || window.CU.avatarData || null;
      setAv('topbar-avatar', ini, col, 34, src); setAv('bn-avatar', ini, col, 26, src);
      document.getElementById('topbar-name').textContent = (name || 'User').split(' ')[0];
      
      if (window.CU.companyId) { 
        getDoc(doc(db, 'companies', window.CU.companyId)).then(s => { 
          if (s.exists()) { 
            const cd = s.data(); document.getElementById('topbar-company').textContent = cd.name; 
            let ip = cd.isPremium === true; 
            if (ip && cd.subscriptionExpiry && new Date() > new Date(cd.subscriptionExpiry)) ip = false; 
            window.CU.isPremium = ip; 
            window.CU.subscriptionExpiry = cd.subscriptionExpiry;
            const u = document.getElementById('globalUpgradeBtn'); if (u) { ip ? u.classList.add('hidden') : u.classList.remove('hidden'); }
            
            const subCard = document.getElementById('sidebar-footer');
            if (subCard) {
              if (ip) {
                const expDate = cd.subscriptionExpiry ? new Date(cd.subscriptionExpiry).toLocaleDateString() : 'Lifetime';
                subCard.innerHTML = `
                  <div style="background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%); border-radius: 16px; padding: 20px 16px; color: white; box-shadow: var(--shadow-sm); border:1px solid rgba(255,255,255,0.1);">
                    <div style="font-weight: 800; font-size: 1rem; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; color: #FBBF24; letter-spacing:-0.02em;">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                      Premium Active
                    </div>
                    <div style="font-size: 0.8rem; color: #94A3B8; font-weight:600;">Valid till ${expDate}</div>
                  </div>
                `;
              } else {
                subCard.innerHTML = `
                  <div style="background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%); border-radius: 16px; padding: 12px 16px; color: white; cursor: pointer; box-shadow: var(--shadow-md); transition: transform 0.2s;" onclick="window.location.href='subscription.html'" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                    <div style="font-weight: 800; font-size: 1rem; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; letter-spacing:-0.02em;">
                      👑 Upgrade Plan
                    </div>
                    <div style="font-size: 0.8rem; opacity: 0.9; font-weight:600;">Unlock all features</div>
                  </div>
                `;
              }
            }
            window.buildProfile(); 
          } 
        }).catch(console.error); 
      }
      
      const h = new Date().getHours();
      const fn = (name || 'User').split(' ')[0];
      document.getElementById('home-greeting').innerHTML = `Good afternoon, <span class="greeting-name">${esc(fn)}</span>`;
      document.getElementById('home-sub').textContent = { owner: 'Overview of your company and team', manager: 'Your team tasks and activity', staff: 'Your assignments and progress' }[role] || '';
      
      const canAssign = role === 'owner' || role === 'manager';
      const isOwner = role === 'owner';
      const canSeeStaff = role === 'owner' || role === 'manager';
      
      if (canAssign) {
        document.getElementById('bn-assign')?.classList.remove('hidden');
        const a = document.getElementById('assign-top-btn'); if (a) a.style.display = '';
      }
      
      const tr = document.getElementById('task-tab-row');
      if (tr) { if (isOwner) { tr.innerHTML = `<button class="btn btn-ghost ftab on" onclick="window.setTaskTab('assigned-by-me',this)">I Assigned</button><button class="btn btn-ghost ftab" onclick="window.setTaskTab('done',this)">Done</button><button class="btn btn-ghost ftab" onclick="window.setTaskTab('declined',this)">Declined</button>`; window.taskTab = 'assigned-by-me'; } else { tr.innerHTML = `<button class="btn btn-ghost ftab on" onclick="window.setTaskTab('assigned-to-me',this)">Assigned To Me</button><button class="btn btn-ghost ftab" onclick="window.setTaskTab('assigned-by-me',this)">I Assigned</button><button class="btn btn-ghost ftab" onclick="window.setTaskTab('done',this)">Done</button><button class="btn btn-ghost ftab" onclick="window.setTaskTab('declined',this)">Declined</button>`; window.taskTab = 'assigned-to-me'; } }
      
      if (canSeeStaff) { document.getElementById('nav-staff')?.classList.remove('hidden'); document.getElementById('team-label')?.classList.remove('hidden'); document.getElementById('bn-staff-btn')?.classList.remove('hidden'); }
      if (isOwner) { const b = document.getElementById('add-staff-btn'); if (b) b.style.display = 'flex'; }
      if (role === 'staff' || role === 'manager') { document.getElementById('charts-row')?.classList.remove('hidden'); initCharts(); }
    }

    function setAv(id, ini, col, sz, src) { const el = document.getElementById(id); if (!el) return; el.style.cssText = `width:${sz}px;height:${sz}px;font-size:${sz*.38}px;`; if (src) el.innerHTML = `<img src="${src}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`; else { el.textContent = ini; el.style.background = col + '22'; el.style.color = col; } }

    function subscribeAll() {
      const { uid, companyId, role } = window.CU;
      const cs = role === 'owner' || role === 'manager';
      const ca = role === 'owner' || role === 'manager';
      
      unsubs.push(listenNotifications(uid, (it, u) => { window.renderNotifs(it); }));
      
      unsubs.push(listenMyTasks(uid, tasks => { window.myTasks = tasks; const p = tasks.filter(t => t.status === 'pending').length; setBadge('task-badge-side', p); setDot('bn-task-dot', p > 0); window.renderRecentTasks(); window.renderTasksList(); if (role === 'staff' || role === 'manager') { updateCharts(tasks); renderNonOwnerStats(tasks); } if (role === 'owner') renderOwnerStats(); }));
      
      if (ca) unsubs.push(listenAssignedByMe(uid, tasks => { window.assignedByMeTasks = tasks; if (role === 'owner') renderOwnerStats(); window.renderRecentTasks(); window.renderTasksList(); }));
      
      if (cs && companyId) unsubs.push(listenCompanyStaff(companyId, staff => { allStaff = staff; if (role === 'owner') renderOwnerStats(); window.renderStaffCards(staff); buildAssignSelect(staff); const n = staff.filter(s => s.role !== 'owner'); const sc = document.getElementById('staff-count-sub'); if (sc) sc.textContent = `${n.length} ${n.length!==1?'members':'member'}`; })); else if (companyId) getAssignableStaff(companyId, uid).then(s => { allStaff = s; }).catch(console.error);
      
      unsubs.push(listenInstalledApps(uid, ids => buildAppsGrid(ids)));
    }

    function sIco(bg, c, p) { return `<div style="background:${bg};color:${c};border-radius:16px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${p}</svg></div>`; }

    function renderOwnerStats() {
      const staff = allStaff.filter(s => s.role !== 'owner');
      const all = [...window.myTasks, ...window.assignedByMeTasks].filter((v, i, a) => a.findIndex(t => t.id === v.id) === i);
      const p = all.filter(t => t.status === 'pending').length, d = all.filter(t => t.status === 'done').length;
      const el = document.getElementById('stats-grid'); if (!el) return;
      el.innerHTML = `<div class="stat-card anim-stagger" onclick="window.showView('staff')" style="cursor:pointer;"><div class="sc-top" style="display:flex; width:100%; align-items:center;"><div class="sc-info"><div class="sc-lbl">Total Staff</div><div class="sc-val">${staff.length}</div></div>${sIco('#EEF2FF','#3A57E8','<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>')}</div></div><div class="stat-card anim-stagger" onclick="window.setTaskTab('assigned-by-me',null);window.showView('tasks')" style="cursor:pointer;"><div class="sc-top" style="display:flex; width:100%; align-items:center;"><div class="sc-info"><div class="sc-lbl">Pending</div><div class="sc-val">${p}</div></div>${sIco('#FFFBEB','#D97706','<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>')}</div></div><div class="stat-card anim-stagger" onclick="window.setTaskTab('done',null);window.showView('tasks')" style="cursor:pointer;"><div class="sc-top" style="display:flex; width:100%; align-items:center;"><div class="sc-info"><div class="sc-lbl">Completed</div><div class="sc-val">${d}</div></div>${sIco('#ECFDF5','#10B981','<path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M9 12l2 2 4-4"/>')}</div></div>`;
    }

    function renderNonOwnerStats(tasks) {
      const p = tasks.filter(t => t.status === 'pending').length, d = tasks.filter(t => t.status === 'done').length;
      const isMgr = window.CU.role === 'manager';
      const el = document.getElementById('stats-grid'); if (!el) return;
      el.innerHTML = isMgr ? `<div class="stat-card anim-stagger" onclick="window.setTaskTab('assigned-to-me',null);window.showView('tasks')" style="cursor:pointer;"><div class="sc-top" style="display:flex; width:100%; align-items:center;"><div class="sc-info"><div class="sc-lbl">My Pending</div><div class="sc-val">${p}</div></div>${sIco('#FFFBEB','#D97706','<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>')}</div></div><div class="stat-card anim-stagger" onclick="window.setTaskTab('done',null);window.showView('tasks')" style="cursor:pointer;"><div class="sc-top" style="display:flex; width:100%; align-items:center;"><div class="sc-info"><div class="sc-lbl">Completed</div><div class="sc-val">${d}</div></div>${sIco('#ECFDF5','#10B981','<path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M9 12l2 2 4-4"/>')}</div></div><div class="stat-card anim-stagger" onclick="window.setTaskTab('assigned-by-me',null);window.showView('tasks')" style="cursor:pointer;"><div class="sc-top" style="display:flex; width:100%; align-items:center;"><div class="sc-info"><div class="sc-lbl">I Assigned</div><div class="sc-val">${window.assignedByMeTasks.length}</div></div>${sIco('#EEF2FF','#3A57E8','<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>')}</div></div>` : `<div class="stat-card anim-stagger" onclick="window.setTaskTab('assigned-to-me',null);window.showView('tasks')" style="cursor:pointer;"><div class="sc-top" style="display:flex; width:100%; align-items:center;"><div class="sc-info"><div class="sc-lbl">Pending</div><div class="sc-val">${p}</div></div>${sIco('#FFFBEB','#D97706','<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>')}</div></div><div class="stat-card anim-stagger" onclick="window.setTaskTab('done',null);window.showView('tasks')" style="cursor:pointer;"><div class="sc-top" style="display:flex; width:100%; align-items:center;"><div class="sc-info"><div class="sc-lbl">Completed</div><div class="sc-val">${d}</div></div>${sIco('#ECFDF5','#10B981','<path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M9 12l2 2 4-4"/>')}</div></div>`;
    }

    function initCharts() { const cv = document.getElementById('main-area-chart'); if (!cv) return; const c = cv.getContext('2d'); const gr = c.createLinearGradient(0, 0, 0, 240); gr.addColorStop(0, 'rgba(79,70,229,.25)'); gr.addColorStop(1, 'rgba(79,70,229,0)'); mainAreaChart = new Chart(c, { type: 'line', data: { labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'], datasets: [{ label: 'Done', data: [0, 0, 0, 0, 0, 0, 0], borderColor: '#3A57E8', backgroundColor: gr, borderWidth: 3, fill: true, tension: .4, pointBackgroundColor: '#fff', pointBorderColor: '#3A57E8', pointBorderWidth: 2, pointRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grid: { color: '#F1F5F9' }, border: { display: false } } } } }); }
    function updateCharts(tasks) { if (!mainAreaChart) return; const days = last7(); mainAreaChart.data.labels = days.map(d => d.label); mainAreaChart.data.datasets[0].data = days.map(day => tasks.filter(t => t.status === 'done' && t.completedAt && new Date(t.completedAt).toDateString() === day.date).length); mainAreaChart.update(); } 
    
    const APPS = { calculator: { label: 'Calculator', icon: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><path d="M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M8 18h.01M12 18h.01"/></svg>', bg: 'linear-gradient(135deg,#3A57E8,#2A41C7)' }, calendar: { label: 'Calendar', icon: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>', bg: 'linear-gradient(135deg,#10B981,#059669)' }, inventory: { label: 'Inventory', icon: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>', bg: 'linear-gradient(135deg,#F59E0B,#D97706)' }, expenses: { label: 'Expenses', icon: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>', bg: 'linear-gradient(135deg,#EF4444,#DC2626)' } };
    function buildAppsGrid(ids) { const el = document.getElementById('apps-grid'); if (!el) return; const all = ['calculator', ...(ids || []).filter(i => i !== 'calculator')]; const vis = all.slice(0, 15), hm = all.length > 15; el.innerHTML = vis.map(id => { const a = APPS[id]; if (!a) return ''; return `<div class="app-squircle-wrap" onclick="window.openApp('${id}')"><div class="app-squircle" style="background:${a.bg}; display:flex; align-items:center; justify-content:center;">${a.icon}</div><span class="app-name">${a.label}</span></div>`; }).join('') + `<div class="app-squircle-wrap" onclick="window.openAppLib()"><div class="app-viewall-tile"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3A57E8" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></div><span class="app-name" style="color:var(--ac);font-weight:700;">${hm?'+'+(all.length-15)+' More':'View All'}</span></div>`; } window.openApp = function(id) { const m = { calculator: 'calculator.html', calendar: 'calendar.html', inventory: 'inventory.html', expenses: 'expenses.html' }; const f = m[id]; if (f) location.href = f + (window.CU?.uid ? '?uid=' + window.CU.uid : ''); else window.showToast('App not found!', 'error'); };

    // Load at bottom to ensure all functions bound
    window.addEventListener('scroll', () => { const tb = document.querySelector('.topbar'); if (tb) tb.classList.toggle('scrolled', window.scrollY > 8); }, { passive: true });
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
  </script>
