<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dashboard — Zenda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="dashboard.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='10' fill='%234F46E5'/><text y='24' x='6' font-size='22' font-family='sans-serif' font-weight='900' fill='white'>Z</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div id="loading-overlay" class="loader-overlay">
  <div class="loader-content">
    <div id="loading-logo-icon" class="loader-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    </div>
    <div class="loader-text">Zenda</div>
  </div>
  <div class="loader-spinner"></div>
</div>

<div class="panel-overlay" id="panel-overlay" onclick="window.closeAllPanels()"></div>

<header class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo" onclick="window.showView('home')">
      <div class="topbar-logo-icon" id="topbar-logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
      <span id="topbar-logo-text">Zenda</span>
    </div>
    <div class="topbar-company" id="topbar-company"></div>
  </div>
  
  <div class="topbar-center hidden-mobile">
    <div class="search-bar-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="global-search" placeholder="Search tasks, team, or apps...">
    </div>
  </div>

  <div class="topbar-right">
    <button id="globalUpgradeBtn" class="premium-btn hidden" onclick="window.location.href='subscription.html'">
      👑 Upgrade
    </button>
    <button class="icon-btn" id="notif-btn" onclick="window.togglePanel('notif-panel')" title="Notifications">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="notif-badge hidden" id="notif-badge">0</span>
    </button>
    <button class="profile-btn" onclick="window.openProfile()">
      <div class="av" id="topbar-avatar" style="width:32px;height:32px;font-size:12px;"></div>
    </button>
  </div>
</header>

<div class="app-body">
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Overview</div>
      <div class="sidebar-item active" id="nav-home" onclick="window.showView('home')">
        <span class="sidebar-item-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>
        <span class="sidebar-item-text">Dashboard</span>
      </div>
      <div class="sidebar-item" id="nav-tasks" onclick="window.showView('tasks')">
        <span class="sidebar-item-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>
        <span class="sidebar-item-text">My Tasks</span>
        <span class="sidebar-badge hidden" id="task-badge-side">0</span>
      </div>
      <div class="sidebar-item hidden" id="nav-assign" onclick="window.openAssignModal()">
        <span class="sidebar-item-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg></span>
        <span class="sidebar-item-text">Assign Work</span>
      </div>
      <div class="sidebar-section-label hidden" id="team-label">Management</div>
      <div class="sidebar-item hidden" id="nav-staff" onclick="window.showView('staff')">
        <span class="sidebar-item-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
        <span class="sidebar-item-text">My Team</span>
      </div>
    </nav>
  </aside>

  <main class="main-content">
    <div id="view-home" class="fade-in-section">
      <div class="page-hdr">
        <div>
          <h1 class="page-ttl" id="home-greeting">Good morning</h1>
          <p class="page-sub" id="home-sub">Here is what's happening with your team today.</p>
        </div>
        <button class="btn btn-primary hidden shadow-hover" id="assign-top-btn" onclick="window.openAssignModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Assign Task
        </button>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="charts-row hidden" id="charts-row">
        <div class="chart-card area-chart-wrap">
          <div class="chart-hdr">
            <div>
              <div class="chart-ttl">Activity Overview</div>
              <div class="chart-sub">Tasks completed vs assigned</div>
            </div>
          </div>
          <div style="height: 240px; position: relative;">
            <canvas id="main-area-chart"></canvas>
          </div>
        </div>
      </div>

      <div class="content-row mt-4">
          <div class="content-card shadow-card">
            <div class="content-hdr">
              <div class="content-ttl" id="recent-ttl">Recent Tasks</div>
              <button class="btn-text" onclick="window.setTaskTab('assigned-to-me',null);window.showView('tasks')">View All</button>
            </div>
            <div id="recent-tasks" class="task-list-wrapper"></div>
          </div>
          
          <div class="content-card shadow-card app-grid-card">
            <div class="content-hdr">
              <div class="content-ttl">My Apps</div>
              <button class="btn-text" onclick="window.openAppLib()">App Library</button>
            </div>
            <div class="apps-grid" id="apps-grid"></div>
          </div>
      </div>
    </div>

    <div id="view-tasks" class="hidden fade-in-section">
      <div class="page-hdr">
        <div>
          <h1 class="page-ttl">My Tasks</h1>
          <p class="page-sub" id="tasks-sub">Manage your ongoing work.</p>
        </div>
      </div>

      <div class="task-filters-row">
        <div class="ftabs" id="task-tab-row">
          <button class="ftab on" onclick="window.setTaskTab('pending',this)" id="tab-pending">Pending</button>
          <button class="ftab" onclick="window.setTaskTab('assigned-to-me',this)" id="tab-to-me">To Me</button>
          <button class="ftab" onclick="window.setTaskTab('assigned-by-me',this)" id="tab-by-me">By Me</button>
          <button class="ftab" onclick="window.setTaskTab('done',this)" id="tab-done">Done</button>
        </div>
      </div>

      <div class="content-card shadow-card task-full-list">
        <div id="tasks-list" class="task-list-wrapper"></div>
      </div>
    </div>

    <div id="view-staff" class="hidden fade-in-section">
      <div class="page-hdr">
        <div>
          <h1 class="page-ttl">My Team</h1>
          <p class="page-sub" id="staff-count-sub">Directory and status.</p>
        </div>
        <button class="btn btn-primary shadow-hover" id="add-staff-btn" onclick="window.openCreateStaffPage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Member
        </button>
      </div>
      
      <div class="search-bar-wrap mb-4">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="global-search" id="staff-search" placeholder="Search team members..." oninput="window.searchStaff(this.value)">
      </div>
      
      <div id="staff-cards-list" class="team-grid"></div>
    </div>
  </main>
</div>

<nav class="bottom-nav ios-dock" id="bottom-nav">
  <div class="bn-items">
    <button class="bn-item active" id="bn-home" onclick="window.showView('home')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>Home</span>
    </button>
    <button class="bn-item" id="bn-tasks" onclick="window.showView('tasks')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="bn-dot" id="bn-task-dot"></span>
      <span>Tasks</span>
    </button>
    <button class="bn-item dock-action-btn hidden" id="bn-assign" onclick="window.openAssignModal()">
      <div class="dock-action-inner">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </button>
    <button class="bn-item hidden" id="bn-staff-btn" onclick="window.showView('staff')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Team</span>
    </button>
    <button class="bn-item" id="bn-profile" onclick="window.openProfile()">
      <div class="av mini-av" id="bn-avatar"></div>
      <span>Profile</span>
    </button>
  </div>
</nav>

<div class="side-panel" id="notif-panel">...</div>
<div id="profile-page"></div>
<div class="profile-side-panel" id="profile-side-panel">...</div>

<script type="module">
  /* Maintain all your existing Firebase imports and logic here.
     I am providing the UPDATED UI Rendering logic below to inject
     the premium designs into the DOM. */

  // --- UPDATED STATS RENDERING (Adds Sparklines) ---
  window.renderOwnerStats = function() {
    const el = document.getElementById('stats-grid');
    if(!el) return;
    el.innerHTML = `
      <div class="stat-card" onclick="window.showView('staff')">
        <div class="sc-top">
          <div class="sc-info">
            <div class="sc-lbl">Total Staff</div>
            <div class="sc-val">12</div>
          </div>
          <div class="sc-ico bg-blue-soft text-blue"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
        </div>
        <div class="sc-bottom"><span class="trend up">↑ 2</span> this month</div>
      </div>
      <div class="stat-card" onclick="window.showView('tasks')">
        <div class="sc-top">
          <div class="sc-info">
            <div class="sc-lbl">Pending Tasks</div>
            <div class="sc-val">8</div>
          </div>
          <div class="sc-ico bg-amber-soft text-amber"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        </div>
        <div class="sc-bottom"><span class="trend down">↓ 1</span> vs last week</div>
      </div>
      <div class="stat-card">
        <div class="sc-top">
          <div class="sc-info">
            <div class="sc-lbl">Completed</div>
            <div class="sc-val">45</div>
          </div>
          <div class="sc-ico bg-green-soft text-green"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        </div>
        <div class="sc-sparkline"><canvas id="spark-completed" width="100" height="30"></canvas></div>
      </div>
      <div class="stat-card">
        <div class="sc-top">
          <div class="sc-info">
            <div class="sc-lbl">Efficiency</div>
            <div class="sc-val">92%</div>
          </div>
          <div class="sc-ico bg-purple-soft text-purple"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
        </div>
        <div class="sc-bottom"><span class="trend up">↑ 4%</span> vs last month</div>
      </div>
    `;
    // Init Sparklines (Example)
    setTimeout(() => {
      const ctx = document.getElementById('spark-completed');
      if(ctx) {
        new Chart(ctx.getContext('2d'), {
          type: 'line',
          data: { labels: ['1','2','3','4','5','6','7'], datasets: [{ data: [12, 19, 15, 25, 22, 30, 45], borderColor: '#10B981', borderWidth: 2, pointRadius: 0, tension: 0.4 }] },
          options: { responsive: false, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false }, tooltip: { enabled: false } } }
        });
      }
    }, 100);
  };

  // --- UPDATED MAIN ANIMATED CHART ---
  window.initCharts = function() {
    const canvas = document.getElementById('main-area-chart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    
    // Create soft gradient
    const gradient = ctx.createLinearGradient(0, 0, 0, 240);
    gradient.addColorStop(0, 'rgba(79, 70, 229, 0.25)'); // Primary Blue Fade
    gradient.addColorStop(1, 'rgba(79, 70, 229, 0.0)');

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        datasets: [{
          label: 'Tasks Completed',
          data: [12, 19, 14, 25, 22, 30, 28],
          borderColor: '#4F46E5', // Primary Blue
          backgroundColor: gradient,
          borderWidth: 3,
          fill: true,
          tension: 0.4, // Smooth curves
          pointBackgroundColor: '#FFFFFF',
          pointBorderColor: '#4F46E5',
          pointBorderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: {
          y: { duration: 1500, easing: 'easeOutQuart' } // Smooth draw animation
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0F172A',
            padding: 12,
            titleFont: { family: 'Plus Jakarta Sans', size: 13 },
            bodyFont: { family: 'Plus Jakarta Sans', size: 14, weight: 'bold' },
            displayColors: false,
            cornerRadius: 8
          }
        },
        scales: {
          x: { grid: { display: false }, border: { display: false } },
          y: { grid: { color: '#F1F5F9', drawBorder: false }, border: { display: false }, beginAtZero: true }
        }
      }
    });
  };

  // --- UPDATED TASK CARD RENDERING (Premium Pills & Hover) ---
  window.renderTaskCard = function(task, showActions) {
    const badgeClass = task.status === 'done' ? 'badge-green' : task.status === 'pending' ? 'badge-amber' : 'badge-red';
    const badgeText = task.status.charAt(0).toUpperCase() + task.status.slice(1);
    
    return `<div class="premium-task-card anim-stagger">
      <div class="task-drag-handle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg></div>
      <div class="task-main">
        <div class="task-title-row">
          <h4 class="task-title">${task.title || 'Untitled Task'}</h4>
          <span class="status-pill ${badgeClass}">${badgeText}</span>
        </div>
        <div class="task-meta-row">
          <span class="meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${task.dueDate || 'No Due Date'}</span>
          <span class="meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> ${task.assignedToName || 'Unassigned'}</span>
        </div>
      </div>
      <div class="task-actions">
        <button class="icon-action-btn done-btn" title="Mark Done"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></button>
      </div>
    </div>`;
  };

  // --- UPDATED STAFF TEAM GRID (Online Rings & Layout) ---
  window.renderStaffCards = function(staff) {
    const el = document.getElementById('staff-cards-list');
    if (!el) return;
    el.innerHTML = staff.map(s => `
      <div class="team-card anim-stagger">
        <div class="team-card-top">
          <div class="avatar-wrap">
            <div class="av lg-av bg-blue-soft text-blue">${s.name.charAt(0)}</div>
            <div class="online-indicator"></div>
          </div>
          <button class="more-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button>
        </div>
        <div class="team-card-info">
          <h4 class="team-name">${s.name}</h4>
          <p class="team-role">${s.designation || 'Staff Member'}</p>
        </div>
        <div class="team-card-actions">
          <button class="btn-subtle w-full"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg> Message</button>
          <button class="btn-primary w-full"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Assign</button>
        </div>
      </div>
    `).join('');
  };

  // --- UPDATED APPS RENDER (Squircles & Gradients) ---
  window.buildAppsGrid = function(ids) {
    const el = document.getElementById('apps-grid');
    if(!el) return;
    el.innerHTML = `
      <div class="app-squircle-wrap">
        <div class="app-squircle bg-grad-blue"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <span class="app-name">Calendar</span>
      </div>
      <div class="app-squircle-wrap">
        <div class="app-squircle bg-grad-purple"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
        <span class="app-name">Expenses</span>
      </div>
      <div class="app-squircle-wrap">
        <div class="app-squircle bg-grad-orange"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></div>
        <span class="app-name">Inventory</span>
      </div>
      <div class="app-squircle-wrap more-apps">
