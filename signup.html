<style>
/* ==========================================================================
   DESIGN TOKENS & RESET (MATCHING DASHBOARD THEME)
   ========================================================================== */
:root {
  --bg-page:       #F3F4F6;
  --bg-surface:    #FFFFFF;
  --border-light:  #E2E8F0;
  --border-mid:    #CBD5E1;
  --text-primary:  #0F172A;
  --text-secondary:#475569;
  --text-tertiary: #94A3B8;
  --brand:         #0066CC;
  --brand-hover:   #0055B3;
  --brand-light:   #EFF6FF;
  --success:       #10B981;
  --error:         #EF4444;
  --error-bg:      #FEF2F2;
  --font-display:  'Plus Jakarta Sans', system-ui, sans-serif;
  --font-body:     'Inter', system-ui, sans-serif;
  --font-mono:     'DM Mono', monospace;
  --r-sm:  8px;
  --r-md:  12px;
  --r-lg:  24px;
  --shadow-card:  0 24px 60px rgba(0, 0, 0, 0.12);
  --shadow-btn:   0 4px 14px rgba(0, 102, 204, 0.25);
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ADAPTIVE NO-SCROLL BODY */
body {
  font-family: var(--font-body);
  background: var(--bg-page);
  height: 100vh;
  width: 100vw;
  overflow: hidden; /* No scrolling */
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}

a { text-decoration: none; color: inherit; }

/* LAYOUT CONTAINER */
.page-container {
  display: flex;
  width: 100%;
  max-width: 1080px;
  height: 100%;
  max-height: 600px;
  background: var(--bg-surface);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  position: relative;
}

/* LEFT: VISUAL PANEL */
.visual-panel {
  flex: 0 0 45%;
  background: linear-gradient(160deg, #E0E7FF 0%, #BAE6FD 50%, #7DD3FC 100%);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid var(--border-light);
  overflow: hidden;
}

/* Back Button */
.btn-back-absolute {
  position: absolute; top: 24px; left: 24px; z-index: 50;
  display: flex; align-items: center; justify-content: center;
  width: 40px; height: 40px; border-radius: var(--r-md);
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.9);
  color: var(--text-primary); cursor: pointer; transition: all 0.3s var(--spring);
}
.btn-back-absolute:hover { background: #FFFFFF; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12); }

/* SVG Animation (Scaled Down & Centered) */
.svg-wrapper {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: scale(0.8); /* Made smaller as requested */
}
.svg-canvas { width: 100%; height: auto; display: block; overflow: visible; }

/* ANIMATION SYSTEM */
.anim-logo { animation: anim-logo 12s linear infinite; transform-origin: 250px 10px; }
@keyframes anim-logo { 0%, 8% { transform: translateY(-340px) rotate(-20deg); opacity:0; } 10% { opacity:1; transform: translateY(-280px) rotate(-10deg); } 15% { transform: translateY(-120px) rotate(0deg); opacity:1; } 18% { transform: translateY(-20px) rotate(0deg); } 20% { transform: translateY(102px) rotate(0deg); } 21% { transform: translateY(70px) rotate(-3deg); } 22%, 63% { transform: translateY(88px) rotate(0deg); opacity:1; } 65% { transform: translateY(108px) rotate(3deg); } 68%, 100% { transform: translateY(-420px) rotate(230deg); opacity:0; } }
.anim-text { animation: anim-text 12s linear infinite; }
@keyframes anim-text { 0%, 21% { opacity: 0; transform: translateY(10px) scale(.96); } 24%, 62% { opacity: 1; transform: translateY(0) scale(1); } 65%, 100% { opacity: 0; transform: translateY(-8px) scale(1.02); } }
.anim-body { transform-origin: 250px 500px; animation: anim-body 12s ease-in-out infinite; }
@keyframes anim-body { 0%, 19% { transform: scaleY(1) scaleX(1); } 20% { transform: scaleY(.88) scaleX(1.08); } 23% { transform: scaleY(1.03) scaleX(.98); } 24%, 63% { transform: scaleY(1) scaleX(1); } 35%, 50% { transform: scaleY(1.01) scaleX(.99) translateY(-3px); } 40%, 55% { transform: scaleY(1) scaleX(1) translateY(0); } 65% { transform: scaleY(.84) scaleX(1.09); } 67% { transform: scaleY(1.06) scaleX(.96); } 75%, 100% { transform: scaleY(1) scaleX(1); } }
.anim-head { transform-origin: 250px 250px; animation: anim-head 12s ease-in-out infinite; }
@keyframes anim-head { 0%, 9% { transform: rotate(-14deg); } 20% { transform: rotate(9deg) translateY(7px); } 24%, 63% { transform: rotate(0deg) translateY(0); } 66% { transform: rotate(-8deg); } 70% { transform: rotate(-28deg); } 80%, 100% { transform: rotate(-14deg); } }
.anim-arm { transform-origin: 295px 308px; animation: anim-arm 12s ease-in-out infinite; }
@keyframes anim-arm { 0%, 19% { transform: rotate(0deg); } 20% { transform: rotate(-118deg); } 24% { transform: rotate(-102deg); } 28%, 36%, 44%, 52%, 60% { transform: rotate(-126deg); } 32%, 40%, 48%, 56%, 63% { transform: rotate(-100deg); } 65% { transform: rotate(35deg); } 68% { transform: rotate(-162deg); } 78%, 100% { transform: rotate(0deg); } }
.anim-idle-float { animation: idle-float 3s ease-in-out infinite; }
@keyframes idle-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

/* RIGHT: FORM PANEL */
.form-panel {
  flex: 1;
  padding: 48px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: var(--bg-surface);
  position: relative;
  overflow-y: auto; /* Fallback if screen is tiny */
}

/* TYPOGRAPHY & FORMS */
.page-title {
  font-family: var(--font-display); font-size: 32px; font-weight: 800;
  color: var(--text-primary); letter-spacing: -0.03em; line-height: 1.2;
  margin-bottom: 32px;
}

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
@media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 6px; position: relative; }
.field.full { margin-bottom: 8px; }

.lbl { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--text-secondary); }

/* DASHBOARD MATCHING INPUTS */
.inp {
  width: 100%; padding: 14px 16px;
  border: 1.5px solid var(--border-light); border-radius: var(--r-md);
  font-size: 15px; font-family: var(--font-body); font-weight: 500;
  color: var(--text-primary); background: var(--bg-surface);
  transition: all 0.2s ease; outline: none;
}
.inp:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1); background: var(--bg-surface); }
.inp::placeholder { color: #A1A1A6; font-weight: 500; }
.inp.err { border-color: var(--error) !important; background: var(--error-bg); }
.inp.err:focus { box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15); }

.err-msg { font-size: 12px; color: var(--error); font-weight: 600; margin-top: 4px; display: none; }
.err-msg.show { display: block; animation: slideDown 0.2s ease-out; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

/* BUTTONS */
.btn-primary {
  width: 100%; padding: 16px; border-radius: var(--r-md);
  font-family: var(--font-display); font-weight: 700; font-size: 16px;
  color: #fff; background: var(--brand); border: none; cursor: pointer;
  transition: all 0.2s var(--spring);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: var(--shadow-btn); margin-top: 16px;
}
.btn-primary:hover { background: var(--brand-hover); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0, 102, 204, 0.3); }
.btn-primary:active { transform: scale(.98); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

/* ==========================================================================
   SLIDE DOWN OTP AREA (MATCHING DASHBOARD STYLES)
   ========================================================================== */
.otp-slide-container {
  max-height: 0; opacity: 0; overflow: hidden;
  transition: all 0.5s var(--spring);
  margin-top: 0;
}
.otp-slide-container.show {
  max-height: 250px; opacity: 1; margin-top: 8px;
}

.otp-info { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 16px; font-weight: 500;}
.otp-info strong { color: var(--text-primary); font-weight: 700; }

.otp-inputs-wrap { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
.otp-box {
  width: 48px; height: 52px; border-radius: 14px; 
  background: #F0F6FF; border: 2px solid #BFDBFE; color: #1D4ED8;
  text-align: center; font-size: 22px; font-weight: 800; outline: none;
  transition: all 0.2s var(--spring); font-family: var(--font-display);
}
.otp-box:focus { border-color: #3B82F6 !important; background: #EFF6FF !important; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2) !important; transform: scale(1.06); }
.otp-box.filled { background: #DBEAFE !important; border-color: #2563EB !important; color: #1D4ED8 !important; box-shadow: 0 2px 8px rgba(37, 99, 235, 0.15) !important; }

.resend-row { text-align: center; font-size: 13px; color: var(--text-secondary); font-weight: 500; }
.resend-val { font-family: var(--font-mono); color: var(--text-primary); font-weight: 700; }
.btn-link { background:none; border:none; color:var(--brand); font-size:13px; font-weight:700; cursor:pointer; font-family:var(--font-body); text-decoration:underline; text-underline-offset:2px; }

/* SUCCESS VIEW */
#view-success { display: none; text-align: center; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
.success-icon {
  width: 72px; height: 72px; border-radius: var(--r-lg); 
  background: var(--brand-light); display: flex;
  align-items: center; justify-content: center;
  margin: 0 auto 24px; box-shadow: 0 12px 24px rgba(0,102,204,.15);
  animation: pop-in .6s var(--spring);
}
@keyframes pop-in { from { transform: scale(0) rotate(-20deg); opacity:0; } to { transform:scale(1) rotate(0); opacity:1; } }

/* TOAST */
#toast-anchor { position:fixed; bottom:32px; right:32px; z-index:9999; display:flex; flex-direction:column; gap:12px; }
.toast {
  padding: 16px 24px; border-radius: var(--r-md); font-size: 15px; font-weight: 600;
  box-shadow: 0 12px 32px rgba(15,23,42,.15); min-width: 280px;
  animation: toast-in .4s var(--spring); border: 1px solid; display: flex; align-items: center; gap: 12px;
}
.toast-ok  { background: var(--text-primary); border-color: #334155; color: #fff; }
.toast-err { background: var(--error-bg); border-color: #FECACA; color: #991B1B; }
@keyframes toast-in { from { opacity:0; transform: translateX(30px) scale(0.95); } to { opacity:1; transform: translateX(0) scale(1); } }
.spinner { width:20px; height:20px; border:3px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; display:inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* RESPONSIVE */
@media (max-width: 900px) {
  body { padding: 0; }
  .page-container { flex-direction: column; max-height: 100vh; border-radius: 0; overflow-y: auto; }
  .visual-panel { flex: none; height: 260px; border-right: none; border-bottom: 1px solid var(--border-light); }
  .form-panel { padding: 32px 24px; justify-content: flex-start; }
  .btn-back-absolute { top: 16px; left: 16px; }
  .svg-wrapper { transform: scale(0.9); }
  .promo-text-desktop { display: none; }
}
</style>
</head>

<script type="module">
import { auth, db, EMAILJS_CONFIG } from './firebase-config.js';
import { ownerSignUp }               from './auth.js';
import { sendOTP, verifyUserOTP }    from './otp.js';
import { isValidEmail }              from './utils.js';

let currentState = 'send'; // 'send' or 'verify'
let timerID = null;

// Initialize EmailJS silently
if (EMAILJS_CONFIG?.publicKey && EMAILJS_CONFIG.publicKey !== 'YOUR_EMAILJS_PUBLIC_KEY') {
  try { emailjs.init({ publicKey: EMAILJS_CONFIG.publicKey }); } catch(e) {}
}

window.clrE = (id) => {
  document.getElementById(id)?.classList.remove('err');
  const e = document.getElementById('e-'+id);
  if (e) { e.textContent=''; e.classList.remove('show'); }
};

const showE = (id, msg) => {
  document.getElementById(id)?.classList.add('err');
  const e = document.getElementById('e-'+id);
  if (e) { e.textContent=msg; e.classList.add('show'); }
};

window.handleMainAction = async () => {
  if (currentState === 'send') {
    await processSendOTP();
  } else {
    await processVerifyOTP();
  }
};

async function processSendOTP() {
  document.querySelectorAll('.inp.err').forEach(x=>x.classList.remove('err'));
  document.querySelectorAll('.err-msg.show').forEach(x=>{x.textContent='';x.classList.remove('show');});
  
  const comp  = document.getElementById('f-comp').value.trim();
  const name  = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  
  let ok = true;
  if (!comp) { showE('f-comp','Company required.'); ok=false; }
  if (!name) { showE('f-name','Name required.'); ok=false; }
  if (!email) { showE('f-email','Email required.'); ok=false; }
  else if (!isValidEmail(email)) { showE('f-email','Invalid email.'); ok=false; }
  
  if (!ok) return;
  
  const btn = document.getElementById('main-btn');
  btnLoad(btn, true);
  
  try {
    await sendOTP(email, name, comp);
    
    // UI Transitions
    document.getElementById('f-comp').disabled = true;
    document.getElementById('f-name').disabled = true;
    document.getElementById('f-email').disabled = true;
    document.getElementById('display-email').textContent = email;
    
    // Slide down OTP Area
    const otpContainer = document.getElementById('otp-slide-container');
    otpContainer.classList.add('show');
    setupBoxes();
    startTimer();
    
    // Change Button State
    currentState = 'verify';
    btnLoad(btn, false, 'Verify & Create Workspace');
    toast('Verification code sent.', 'toast-ok');

  } catch(err) {
    toast('Error: ' + err.message, 'toast-err');
    btnLoad(btn, false, 'Send Verification Code');
  }
}

async function processVerifyOTP() {
  const otp = getOTP();
  if (otp.length !== 6) { toast('Enter the complete 6-digit code.', 'toast-err'); return; }
  
  const btn = document.getElementById('main-btn');
  btnLoad(btn, true);
  
  try {
    const email = document.getElementById('f-email').value.trim();
    const res = await verifyUserOTP(email, otp);
    
    if (!res.success) {
      toast(res.message, 'toast-err');
      clearBoxes();
      btnLoad(btn, false, 'Verify & Create Workspace');
      return;
    }
    
    const comp  = document.getElementById('f-comp').value.trim();
    const name  = document.getElementById('f-name').value.trim();
    await ownerSignUp(comp, name, email);
    
    // Success State
    document.getElementById('view-form').style.display = 'none';
    document.getElementById('view-success').style.display = 'flex';
    toast('Workspace created! 🎉', 'toast-ok');

  } catch(err) {
    toast('Error: ' + err.message, 'toast-err');
    btnLoad(btn, false, 'Verify & Create Workspace');
  }
}

window.resendOTP = async () => {
  try {
    await sendOTP(document.getElementById('f-email').value.trim());
    clearBoxes(); startTimer();
    toast('New code sent.', 'toast-ok');
  } catch(e) { toast('Failed to resend.', 'toast-err'); }
};

// DASHBOARD STYLE OTP INPUT LOGIC
function setupBoxes() {
  const boxes = [...document.querySelectorAll('#otp-row .otp-box')];
  boxes.forEach((b, i) => {
    b.value = ''; b.classList.remove('filled');
    b.oninput = (e) => {
      b.value = b.value.replace(/[^0-9]/g, '');
      if (b.value) {
          b.classList.add('filled');
          if (i < boxes.length - 1) boxes[i + 1].focus();
      } else {
          b.classList.remove('filled');
      }
      if (getOTP().length === 6) processVerifyOTP();
    };
    b.onkeydown = (e) => {
      if (e.key === 'Backspace') {
        if (!b.value && i > 0) {
            boxes[i - 1].focus();
            boxes[i - 1].value = '';
            boxes[i - 1].classList.remove('filled');
        } else {
            b.value = '';
            b.classList.remove('filled');
        }
      }
    };
    b.onpaste = (e) => {
      e.preventDefault();
      const d = e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);
      d.split('').forEach((c,j) => { if (boxes[j]) { boxes[j].value=c; boxes[j].classList.add('filled'); }});
      if (d.length===6) processVerifyOTP();
    };
  });
  setTimeout(() => boxes[0]?.focus(), 400); // Focus after slide animation
}

function getOTP() { return [...document.querySelectorAll('#otp-row .otp-box')].map(b=>b.value).join(''); }
function clearBoxes() { [...document.querySelectorAll('#otp-row .otp-box')].forEach(b=>{b.value='';b.classList.remove('filled');}); document.querySelector('#otp-row .otp-box')?.focus(); }

function startTimer() {
  if (timerID) clearInterval(timerID);
  let s = 60;
  const tv=document.getElementById('timer-val'), tt=document.getElementById('timer-txt'), rb=document.getElementById('resend-btn');
  tt.style.display='inline'; rb.style.display='none'; tv.textContent=s+'s';
  timerID = setInterval(() => {
    tv.textContent=(--s)+'s';
    if (s<=0) { clearInterval(timerID); tt.style.display='none'; rb.style.display='inline'; }
  }, 1000);
}

function btnLoad(btn, loading, label) {
  if (!btn) return;
  if (loading) { btn.disabled=true; btn.dataset.lbl=btn.innerHTML; btn.innerHTML='<span class="spinner"></span>'; }
  else { btn.disabled=false; btn.innerHTML=label||btn.dataset.lbl||'Submit'; }
}

function toast(msg, cls='toast-ok') {
  const a = document.getElementById('toast-anchor');
  const t = document.createElement('div');
  t.className = `toast ${cls}`;
  t.innerHTML = `<span>${msg}</span>`;
  a.appendChild(t);
  setTimeout(() => { t.style.cssText='opacity:0;transform:translateX(30px) scale(0.95);transition:all .3s'; setTimeout(()=>t.remove(),300); }, 3500);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleMainAction();
});
</script>
