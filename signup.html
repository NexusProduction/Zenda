<style>
/* ── DESIGN TOKENS ─────────────────────────────────────────── */
:root {
  --bg-page:       #EFF6FF;
  --bg-surface:    #FFFFFF;
  --bg-alt:        #F8FAFC;
  --border-light:  #E2E8F0;
  --border-mid:    #CBD5E1;
  --border-dark:   #94A3B8;
  --text-primary:  #0F172A;
  --text-secondary:#475569;
  --text-tertiary: #64748B;
  --brand:         #4F46E5;
  --brand-hover:   #4338CA;
  --brand-light:   #EEF2FF;
  --success:       #10B981;
  --success-dark:  #059669;
  --error:         #EF4444;
  --error-bg:      #FEF2F2;
  --warning:       #F59E0B;
  --font-display:  'Plus Jakarta Sans', system-ui, sans-serif;
  --font-body:     'DM Sans', system-ui, sans-serif;
  --font-mono:     'DM Mono', monospace;
  --r-sm:  8px;
  --r-md:  12px;
  --r-lg:  24px;
  --r-xl:  32px;
  --shadow-card:  0 20px 60px rgba(15,23,42,.08);
  --shadow-brand: 0 6px 16px rgba(79,70,229,.25);
}

/* ── RESET ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg-page);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  -webkit-font-smoothing: antialiased;
}
a { text-decoration: none; color: inherit; }
:focus-visible { outline: 3px solid var(--brand); outline-offset: 2px; border-radius: 6px; }

/* ── DESKTOP LAYOUT ────────────────────────────────────────── */
.page-container {
  display: grid;
  grid-template-columns: 44% 56%;
  max-width: 1080px;
  width: 100%;
  background: var(--bg-surface);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card), 0 0 24px rgba(79, 70, 229, 0.15);
  overflow: hidden;
  height: min(660px, 92vh);
  border: 1px solid var(--border-mid);
}

/* ── LEFT: VISUAL PANEL ────────────────────────────────────── */
.visual-panel {
  background: linear-gradient(160deg, #DBEAFE 0%, #BAE6FD 50%, #7DD3FC 100%);
  position: relative;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  border-right: 1px solid rgba(0,0,0,.06);
  overflow: hidden;
}
.svg-canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* ═══════════════════════════════════════════════════════════════
   ANIMATION SYSTEM — 12s master loop, ALL sync-critical on linear
   ───────────────────────────────────────────────────────────────
   EXACT TIMELINE (1% = 0.12s):
    0–10%  : Sad idle. Boy looks up. Gentle breathing.
   10–19%  : Logo falls from sky (spinning entry)
   20%     : IMPACT — squash + face→HAPPY + arm snaps up
   20–22%  : Logo bounce (overshoot up, settle)
   22%     : Logo fully settled on hair
   24–26%  : Text FADES IN (after logo visibly settled)
   26–63%  : HAPPY phase — arm waves, text visible, body bobs
   63–65%  : Text FADES OUT
   65%     : Logo anticipation dip + arm winds back
   67%     : Logo THROWN up. Body stretches.
   67–74%  : Logo flies off screen
   72%     : Face→SAD. Arm drops.
   74–100% : Sad idle reset. Looking up.
═══════════════════════════════════════════════════════════════ */

/* ── LOGO: linear so % = exact wall-clock seconds ── */
.anim-logo {
  animation: anim-logo 12s linear infinite;
  transform-origin: 250px 10px;
}
@keyframes anim-logo {
  0%    { transform: translateY(-340px) rotate(-20deg); opacity:0; }
  8%    { transform: translateY(-340px) rotate(-20deg); opacity:0; }
  10%   { opacity:1; transform: translateY(-280px) rotate(-10deg); }
  /* Accelerating fall */
  15%   { transform: translateY(-120px) rotate(0deg); opacity:1; }
  18%   { transform: translateY(-20px)  rotate(0deg); }
  /* IMPACT */
  20%   { transform: translateY(102px)  rotate(0deg); }
  /* Bounce overshoot */
  21%   { transform: translateY(70px)   rotate(-3deg); }
  /* Settle — stays here until throw */
  22%   { transform: translateY(88px)   rotate(0deg); opacity:1; }
  63%   { transform: translateY(88px)   rotate(0deg); opacity:1; }
  /* Anticipation dip */
  65%   { transform: translateY(108px)  rotate(3deg); }
  /* THROW */
  68%   { transform: translateY(-420px) rotate(230deg); opacity:1; }
  72%   { transform: translateY(-420px) rotate(230deg); opacity:0; }
  100%  { transform: translateY(-420px) rotate(230deg); opacity:0; }
}

/* ── TEXT: linear, locked to logo settle (22%) → throw (65%) ── */
.anim-text {
  animation: anim-text 12s linear infinite;
}
@keyframes anim-text {
  0%    { opacity:0; transform: translateY(10px) scale(.96); }
  22%   { opacity:0; transform: translateY(10px) scale(.96); }
  /* Fade in AFTER logo settled */
  25%   { opacity:1; transform: translateY(0)    scale(1);   }
  62%   { opacity:1; transform: translateY(0)    scale(1);   }
  /* Fade out BEFORE throw begins */
  65%   { opacity:0; transform: translateY(-8px) scale(1.02); }
  100%  { opacity:0; transform: translateY(-8px) scale(1.02); }
}

/* ── FACE SAD: linear, step-end for instant swap ── */
.anim-face-sad {
  animation: anim-face-sad 12s linear infinite;
}
@keyframes anim-face-sad {
  0%    { opacity:1; }
  21.9% { opacity:1; }
  22%   { opacity:0; }
  71.9% { opacity:0; }
  72%   { opacity:1; }
  100%  { opacity:1; }
}

/* ── FACE HAPPY: linear, step-end for instant swap ── */
.anim-face-happy {
  animation: anim-face-happy 12s linear infinite;
}
@keyframes anim-face-happy {
  0%    { opacity:0; }
  21.9% { opacity:0; }
  22%   { opacity:1; }
  71.9% { opacity:1; }
  72%   { opacity:0; }
  100%  { opacity:0; }
}

/* ── BODY: ease-based, squash on impact + squat on throw ── */
.anim-body {
  transform-origin: 250px 500px;
  animation: anim-body 12s ease-in-out infinite;
}
@keyframes anim-body {
  0%,  19%  { transform: scaleY(1)    scaleX(1); }
  20%        { transform: scaleY(.88)  scaleX(1.08); }  /* squash */
  23%        { transform: scaleY(1.03) scaleX(.98); }   /* stretch recover */
  24%,  63%  { transform: scaleY(1)    scaleX(1); }
  /* gentle happy bob — only slight, 2 bobs */
  35%        { transform: scaleY(1.01) scaleX(.99) translateY(-3px); }
  40%        { transform: scaleY(1)    scaleX(1)   translateY(0);    }
  50%        { transform: scaleY(1.01) scaleX(.99) translateY(-3px); }
  55%        { transform: scaleY(1)    scaleX(1)   translateY(0);    }
  65%        { transform: scaleY(.84)  scaleX(1.09); }  /* throw crouch */
  67%        { transform: scaleY(1.06) scaleX(.96); }   /* throw stretch */
  75%,  100% { transform: scaleY(1)    scaleX(1); }
}

/* ── HEAD: ease-based, tilt + absorb impact + track throw ── */
.anim-head {
  transform-origin: 250px 250px;
  animation: anim-head 12s ease-in-out infinite;
}
@keyframes anim-head {
  0%,   9%   { transform: rotate(-14deg); }  /* looking up, waiting */
  20%         { transform: rotate(9deg) translateY(7px); }  /* absorb */
  24%         { transform: rotate(0deg) translateY(0); }    /* balanced */
  63%         { transform: rotate(0deg); }
  66%         { transform: rotate(-8deg); }                 /* pre-throw look up */
  70%         { transform: rotate(-28deg); }                /* tracking logo up */
  80%,  100%  { transform: rotate(-14deg); }               /* reset to wait */
}

/* ── ARM: smooth wave, not mechanical steps ── */
.anim-arm {
  transform-origin: 295px 308px;
  animation: anim-arm 12s ease-in-out infinite;
}
@keyframes anim-arm {
  0%,   19%  { transform: rotate(0deg); }
  20%         { transform: rotate(-118deg); }  /* snaps up on catch */
  /* smooth natural wave — slower, fewer steps */
  24%         { transform: rotate(-102deg); }
  28%         { transform: rotate(-126deg); }
  32%         { transform: rotate(-100deg); }
  36%         { transform: rotate(-126deg); }
  40%         { transform: rotate(-100deg); }
  44%         { transform: rotate(-126deg); }
  48%         { transform: rotate(-100deg); }
  52%         { transform: rotate(-126deg); }
  56%         { transform: rotate(-100deg); }
  60%         { transform: rotate(-126deg); }
  63%         { transform: rotate(-100deg); }
  /* Wind-up and throw */
  65%         { transform: rotate(35deg); }    /* big wind-back */
  68%         { transform: rotate(-162deg); }  /* explosive throw */
  78%,  100%  { transform: rotate(0deg); }     /* settle to rest */
}

/* ── IDLE BREATH: subtle floating ── */
.anim-idle-float {
  animation: idle-float 3s ease-in-out infinite;
}
@keyframes idle-float {
  0%,  100% { transform: translateY(0); }
  50%        { transform: translateY(-4px); }
}

/* ── LOGO GLOW PULSE while settled ── */
.anim-logo-glow {
  animation: logo-glow 12s linear infinite;
}
@keyframes logo-glow {
  0%,   22%  { opacity:0; }
  25%         { opacity:1; }
  62%         { opacity:1; }
  65%,  100%  { opacity:0; }
}

/* Leaf sway */
.leaf-a { animation: leaf-a 4.5s ease-in-out infinite alternate; transform-origin: center bottom; }
.leaf-b { animation: leaf-b 6s   ease-in-out infinite alternate-reverse; transform-origin: center bottom; }
@keyframes leaf-a { 0% { transform: rotate(-3deg) scaleX(1);    } 100% { transform: rotate(4deg) scaleX(1.02);  } }
@keyframes leaf-b { 0% { transform: rotate(3deg)  scaleX(1.01); } 100% { transform: rotate(-4deg) scaleX(1);   } }

/* ── RIGHT: FORM PANEL ─────────────────────────────────────── */
.form-panel {
  padding: 40px 56px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow-y: auto;
  position: relative;
}

/* ── STEP TRACKER ──────────────────────────────────────────── */
.steps-row {
  display: flex;
  align-items: center;
  margin-bottom: 28px;
  gap: 0;
}
.step-node {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex: 1;
  position: relative;
}
.step-node::after {
  content: '';
  position: absolute;
  top: 13px; left: 50%;
  width: 100%; height: 2px;
  background: var(--border-light);
  z-index: 0;
  transition: background .4s;
}
.step-node:last-child::after { display: none; }
.step-node.done::after { background: var(--brand); }

.step-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border-mid);
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 800;
  font-family: var(--font-display);
  color: var(--text-tertiary);
  background: var(--bg-surface);
  position: relative; z-index: 1;
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
}
.step-node.active .step-dot {
  border-color: var(--brand); color: var(--brand);
  background: var(--brand-light);
  transform: scale(1.18);
  box-shadow: 0 0 0 4px rgba(79,70,229,.1);
}
.step-node.done .step-dot {
  border-color: var(--brand); background: var(--brand); color: #fff;
}
.step-lbl {
  font-size: .68rem; color: var(--text-tertiary); font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em;
  white-space: nowrap;
}
.step-node.active .step-lbl { color: var(--text-primary); }
.step-node.done .step-lbl   { color: var(--brand); }

/* ── TYPOGRAPHY ────────────────────────────────────────────── */
.page-title {
  font-family: var(--font-display);
  font-size: 1.85rem; font-weight: 800;
  color: var(--text-primary);
  letter-spacing: -.03em; line-height: 1.2;
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 10px;
}
.page-sub {
  font-size: .88rem; color: var(--text-secondary);
  margin-bottom: 24px; font-weight: 500; line-height: 1.5;
}
.link { color: var(--brand); font-weight: 700; text-decoration: underline; text-underline-offset: 3px; }
.link:hover { color: var(--brand-hover); }

/* ── FORM GRID ─────────────────────────────────────────────── */
.stack  { display: flex; flex-direction: column; gap: 14px; }
.grid2  { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.field  { display: flex; flex-direction: column; gap: 5px; }

.lbl {
  font-family: var(--font-display); font-size: .82rem;
  font-weight: 700; color: var(--text-primary);
}
.inp {
  width: 100%; padding: 13px 15px;
  border: 1.5px solid var(--border-mid);
  border-radius: var(--r-md); font-size: .92rem;
  outline: none; transition: all .2s;
  background: var(--bg-alt); color: var(--text-primary);
  font-family: var(--font-body); font-weight: 500;
}
.inp:hover:not(:focus) { border-color: var(--border-dark); background: #fff; }
.inp:focus { background: #fff; border-color: var(--brand); box-shadow: 0 0 0 4px rgba(79,70,229,.1); }
.inp::placeholder { color: var(--text-tertiary); font-weight: 400; }
.inp.err { border-color: var(--error) !important; background: var(--error-bg); }
.inp.err:focus { box-shadow: 0 0 0 4px rgba(239,68,68,.12); }

.err-msg { font-size: .73rem; color: var(--error); font-weight: 600; min-height: 14px; display: none; }
.err-msg.show { display: block; }

/* Password */
.pwd-wrap { position: relative; }
.pwd-wrap .inp { padding-right: 44px; }
.eye-btn {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--text-tertiary); padding: 4px;
  display: flex; align-items: center;
  transition: color .2s;
}
.eye-btn:hover { color: var(--text-primary); }

/* Strength bar */
.str-track { height: 3px; border-radius: 3px; background: var(--border-light); margin-top: 4px; overflow: hidden; }
.str-fill   { height: 100%; border-radius: 3px; width: 0; transition: all .4s cubic-bezier(.34,1.56,.64,1); }

/* ── BUTTONS ───────────────────────────────────────────────── */
.btn-primary {
  width: 100%; padding: 15px;
  border-radius: var(--r-md);
  font-family: var(--font-display); font-weight: 800;
  font-size: 1rem; color: #fff;
  background: var(--brand);
  border: none; cursor: pointer;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 6px; box-shadow: var(--shadow-brand);
}
.btn-primary:hover   { background: var(--brand-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(79,70,229,.35); }
.btn-primary:active  { transform: scale(.98); }
.btn-primary:disabled{ opacity:.6; cursor:not-allowed; transform:none; box-shadow:none; }
.btn-primary.success { background: var(--success) !important; box-shadow: 0 8px 20px rgba(16,185,129,.3) !important; pointer-events:none; }

.btn-back {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: .88rem; font-weight: 700; color: var(--text-secondary);
  cursor: pointer; background: none; border: none;
  padding: 6px 8px; border-radius: var(--r-sm);
  font-family: var(--font-body); transition: all .2s;
  margin-bottom: 18px; margin-left: -8px;
}
.btn-back:hover { color: var(--brand); background: var(--brand-light); }

/* ── OTP BOXES ─────────────────────────────────────────────── */
.otp-row {
  display: flex; gap: 10px;
  justify-content: center; margin: 20px 0;
}
.otp-box {
  width: 52px; height: 60px;
  text-align: center;
  font-family: var(--font-mono); font-size: 1.5rem; font-weight: 700;
  border: 2px solid var(--border-mid); border-radius: var(--r-md);
  background: var(--bg-alt); color: var(--text-primary);
  outline: none; transition: all .2s;
}
.otp-box:focus  { background: #fff; border-color: var(--brand); box-shadow: 0 0 0 4px rgba(79,70,229,.1); transform: scale(1.05); }
.otp-box.filled { border-color: var(--brand); background: var(--brand-light); color: var(--brand); }

.resend-row { text-align: center; font-size: .83rem; color: var(--text-tertiary); margin-top: 10px; font-weight: 500; }
.resend-val { font-family: var(--font-mono); color: var(--text-primary); font-weight: 700; }
.btn-link { background:none; border:none; color:var(--brand); font-size:.83rem; font-weight:700; cursor:pointer; font-family:var(--font-body); text-decoration:underline; text-underline-offset:2px; }

/* ── SUCCESS STEP ──────────────────────────────────────────── */
.success-wrap   { text-align: center; display: flex; flex-direction: column; align-items: center; }
.success-icon   {
  width: 76px; height: 76px; border-radius: var(--r-lg);
  background: var(--brand-light); display: flex;
  align-items: center; justify-content: center;
  margin-bottom: 18px; box-shadow: 0 12px 24px rgba(79,70,229,.15);
  animation: pop-in .6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop-in { from { transform: scale(0) rotate(-20deg); opacity:0; } to { transform:scale(1) rotate(0); opacity:1; } }

.code-box {
  background: #fff; border: 2px dashed var(--border-mid);
  border-radius: var(--r-md); padding: 18px;
  margin: 14px 0; cursor: pointer;
  transition: all .25s; width: 100%;
}
.code-box:hover { border-color: var(--brand); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,70,229,.1); }
.code-label { font-size: .72rem; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; font-family: var(--font-display); }
.code-val   { font-family: var(--font-mono); font-size: 1.9rem; color: var(--text-primary); letter-spacing: .15em; font-weight: 700; }
.code-hint  { font-size: .78rem; color: var(--text-tertiary); margin-top: 6px; font-weight: 500; }

.card-area  { margin: 14px 0; border-radius: 14px; overflow: hidden; box-shadow: 0 8px 24px rgba(15,23,42,.08); width: 100%; border: 1px solid var(--border-light); transition: transform .3s; }
.card-area:hover { transform: scale(1.02); }

.action-row { display: flex; gap: 12px; width: 100%; margin-top: 10px; }
.btn-dl {
  flex:1; padding: 13px; background: #fff; border: 2px solid var(--border-mid);
  border-radius: var(--r-sm); color: var(--text-primary);
  font-family: var(--font-display); font-weight: 800; font-size: .9rem;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-dl:hover { border-color: var(--text-primary); background: var(--bg-alt); }
.btn-wa {
  flex:1; padding: 13px; background: var(--success);
  border: none; border-radius: var(--r-sm); color: #fff;
  font-family: var(--font-display); font-weight: 800; font-size: .9rem;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 12px rgba(16,185,129,.2);
}
.btn-wa:hover { background: var(--success-dark); transform: translateY(-1px); }

/* ── TOAST ─────────────────────────────────────────────────── */
#toast-anchor { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:10px; }
.toast {
  padding: 14px 20px; border-radius: var(--r-md); font-size: .9rem; font-weight: 700;
  box-shadow: 0 8px 24px rgba(15,23,42,.1); min-width: 220px;
  animation: toast-in .3s cubic-bezier(.34,1.56,.64,1);
  border: 1px solid; display: flex; align-items: center; gap: 10px;
}
.toast-ok  { background: var(--text-primary); border-color: #334155; color: #fff; }
.toast-err { background: var(--error-bg); border-color: #FECACA; color: #991B1B; }
.toast-info{ background: var(--brand-light); border-color: #C7D2FE; color: var(--text-primary); }
@keyframes toast-in { from { opacity:0; transform: translateX(24px); } to { opacity:1; transform: translateX(0); } }

.spinner { width:18px; height:18px; border:3px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; display:inline-block; vertical-align:middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* City background — removed */
.bg-city { display: none !important; }

/* Mobile plants hidden on desktop */
.mobile-plants { display: none; }

/* ── MOBILE / TABLET ───────────────────────────────────────── */
@media (max-width: 820px) {
  body {
    padding: 0;
    align-items: flex-start;
    background: linear-gradient(175deg, #DBEAFE 0%, #BAE6FD 55%, #7DD3FC 100%);
  }
  .page-container {
    grid-template-columns: 1fr;
    border-radius: 0;
    max-width: 100%;
    width: 100%;
    height: auto;
    min-height: 100vh;
    box-shadow: none;
    border: none;
    background: transparent;
  }
  .visual-panel {
    height: clamp(280px, 50vw, 380px); /* Taller to allow logo space */
    border: none;
    border-radius: 0;
    order: 1;
    background: transparent;
    overflow: visible;
  }
  .svg-canvas { max-width: 100%; width: 100%; height: 100%; }
  .promo-text-desktop { display: none !important; }
  .mobile-plants { display: block; }

          Check your inbox
        </div>
        <div style="font-size:.9rem;color:var(--text-secondary);line-height:1.6;font-weight:500">
          We sent a 6-digit code to<br>
          <strong style="color:var(--text-primary)" id="otp-email"></strong>
        </div>
      </div>

      <div class="otp-row" id="otp-row">
        <input class="otp-box" maxlength="1" inputmode="numeric" aria-label="Digit 1">
        <input class="otp-box" maxlength="1" inputmode="numeric" aria-label="Digit 2">
        <input class="otp-box" maxlength="1" inputmode="numeric" aria-label="Digit 3">
        <input class="otp-box" maxlength="1" inputmode="numeric" aria-label="Digit 4">
        <input class="otp-box" maxlength="1" inputmode="numeric" aria-label="Digit 5">
        <input class="otp-box" maxlength="1" inputmode="numeric" aria-label="Digit 6">
      </div>

      <button class="btn-primary" id="btn2" onclick="handleVerify()">
        Create Workspace Now
      </button>

      <div class="resend-row" style="margin-top:12px">
        <span id="timer-txt">Resend in <strong class="resend-val" id="timer-val">60s</strong></span>
        <button class="btn-link" id="resend-btn" onclick="resendOTP()" style="display:none">Resend code</button>
      </div>
    </div>

    <!-- ── STEP 3: Success ── -->
    <div id="view3" style="display:none">
      <div class="success-wrap">
        <div class="success-icon">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none"
               stroke="var(--brand)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="page-title" style="justify-content:center;font-size:1.6rem;margin-bottom:6px">
          Workspace is Live!
        </div>
        <p style="font-size:.88rem;color:var(--text-secondary);margin-bottom:18px;font-weight:500;line-height:1.5">
          Your environment is ready. Save your master access code below.
        </p>

        <div class="code-box" id="code-box" onclick="copyCode()">
          <div class="code-label">Master Company Code</div>
          <div class="code-val" id="code-val">—</div>
          <div class="code-hint">Click to copy</div>
        </div>

        <div id="card-container" class="card-area"></div>

        <div class="action-row">
          <button class="btn-dl" onclick="dlCard()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Save Card
          </button>
          <button class="btn-wa" onclick="waCard()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            Share
          </button>
        </div>

        <button class="btn-primary" onclick="window.location.href='dashboard.html'"
                style="margin-top:20px;padding:17px">
          Enter Dashboard →
        </button>
      </div>
    </div>

  </div>
</div>

<div id="toast-anchor"></div>

<script type="module">
import { auth, db, EMAILJS_CONFIG } from './firebase-config.js';
import { ownerSignUp }               from './auth.js';
import { sendOTP, verifyUserOTP }    from './otp.js';
import { renderCardToElement, downloadCard, shareCardWhatsApp } from './card-generator.js';
import { isValidEmail }              from './utils.js';

let createdCanvas = null;
let createdCode   = '';
let timerID       = null;

/* EmailJS init */
if (EMAILJS_CONFIG?.publicKey && EMAILJS_CONFIG.publicKey !== 'YOUR_EMAILJS_PUBLIC_KEY') {
  try { emailjs.init({ publicKey: EMAILJS_CONFIG.publicKey }); } catch(e) {}
}

/* ── Step navigation ───────────────────────────────────── */
window.showStep = (n) => {
  [1,2,3].forEach(i => {
    document.getElementById('view'+i).style.display = (i===n) ? 'block' : 'none';
    const node = document.getElementById('sn'+i);
    node.className = 'step-node' + (i < n ? ' done' : i===n ? ' active' : '');
    const dot = node.querySelector('.step-dot');
    dot.innerHTML = i < n
      ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
      : i;
  });
};

/* ── Utilities ─────────────────────────────────────────── */
window.clrE = (id) => {
  document.getElementById(id)?.classList.remove('err');
  const e = document.getElementById('e-'+id);
  if (e) { e.textContent=''; e.classList.remove('show'); }
};
const showE = (id, msg) => {
  document.getElementById(id)?.classList.add('err');
  const e = document.getElementById('e-'+id);
  if (e) { e.textContent=msg; e.classList.add('show'); }
};
const clearAll = () => {
  document.querySelectorAll('.inp.err').forEach(x=>x.classList.remove('err'));
  document.querySelectorAll('.err-msg.show').forEach(x=>{x.textContent='';x.classList.remove('show');});
};
window.toggleEye = (id, btn) => {
  const inp = document.getElementById(id);
  if (!inp) return;
  const show = inp.type==='password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show
    ? '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
    : '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
};
window.updStr = (pwd) => {
  const bar = document.getElementById('str-bar');
  if (!bar) return;
  if (!pwd) { bar.style.width='0'; return; }
  let s = 0;
  if (pwd.length>=6) s++;
  if (pwd.length>=10) s++;
  if (/[A-Z]/.test(pwd)) s++;
  if (/\d/.test(pwd)) s++;
  if (/[^A-Za-z0-9]/.test(pwd)) s++;
  const ws=['0%','20%','40%','60%','80%','100%'];
  const cs=['','#EF4444','#F59E0B','#3B82F6','#10B981','#059669'];
  bar.style.width=ws[s]; bar.style.background=cs[s];
};

/* ── Step 1 ────────────────────────────────────────────── */
window.handleStep1 = async () => {
  clearAll();
  const comp  = document.getElementById('f-comp').value.trim();
  const name  = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const pwd   = document.getElementById('f-pwd').value;
  const pwd2  = document.getElementById('f-pwd2').value;
  let ok = true;
  if (!comp)              { showE('f-comp','Company name required.'); ok=false; }
  if (!name)              { showE('f-name','Full name required.'); ok=false; }
  if (!email)             { showE('f-email','Email required.'); ok=false; }
  else if (!isValidEmail(email)) { showE('f-email','Invalid email.'); ok=false; }
  if (!pwd)               { showE('f-pwd','Password required.'); ok=false; }
  else if (pwd.length<6)  { showE('f-pwd','Minimum 6 characters.'); ok=false; }
  if (pwd !== pwd2)       { showE('f-pwd2','Passwords do not match.'); ok=false; }
  if (!ok) return;

  const btn = document.getElementById('btn1');
  btnLoad(btn, true);
  try {
    await sendOTP(email, name, comp);
    document.getElementById('otp-email').textContent = email;
    btn.classList.add('success'); btn.innerHTML = 'Code Sent ✓';
    setTimeout(() => {
      btn.classList.remove('success');
      btnLoad(btn, false, 'Send Verification Code');
      showStep(2); setupBoxes(); startTimer();
    }, 480);
    toast('Verification code sent.', 'toast-info');
  } catch(err) {
    toast('Error: ' + err.message, 'toast-err');
    btnLoad(btn, false, 'Send Verification Code');
  }
};

/* ── Step 2 ────────────────────────────────────────────── */
window.handleVerify = async () => {
  const otp = getOTP();
  if (otp.length !== 6) { toast('Enter the complete 6-digit code.', 'toast-err'); return; }
  const btn = document.getElementById('btn2');
  btnLoad(btn, true);
  try {
    const email = document.getElementById('f-email').value.trim();
    const res = await verifyUserOTP(email, otp);
    if (!res.success) {
      toast(res.message, 'toast-err');
      clearBoxes();
      btnLoad(btn, false, 'Create Workspace Now');
      return;
    }
    const comp  = document.getElementById('f-comp').value.trim();
    const name  = document.getElementById('f-name').value.trim();
    const pwd   = document.getElementById('f-pwd').value;
    const data  = await ownerSignUp(comp, name, email, pwd);
    createdCode = data.uniqueCode;
    btn.classList.add('success'); btn.innerHTML = 'Verified ✓';
    setTimeout(() => {
      showStep(3);
      document.getElementById('code-val').textContent =
        createdCode.slice(0,4) + '-' + createdCode.slice(4);
      createdCanvas = renderCardToElement('card-container', 'company', {
        companyName: comp, ownerName: name, email, uniqueCode: createdCode
      });
    }, 480);
    toast('Workspace created! 🎉', 'toast-ok');
  } catch(err) {
    toast('Error: ' + err.message, 'toast-err');
    btnLoad(btn, false, 'Create Workspace Now');
  }
};

window.resendOTP = async () => {
  try {
    await sendOTP(document.getElementById('f-email').value.trim());
    clearBoxes(); startTimer();
    toast('New code sent.', 'toast-info');
  } catch(e) { toast('Failed to resend.', 'toast-err'); }
};
window.copyCode = () => {
  if (!createdCode) return;
  navigator.clipboard.writeText(createdCode).then(() => {
    const b = document.getElementById('code-box');
    b.style.borderColor='var(--brand)'; b.style.background='var(--brand-light)';
    setTimeout(() => { b.style.borderColor=''; b.style.background=''; }, 900);
    toast('Code copied!', 'toast-ok');
  });
};
window.dlCard = () => {
  if (createdCanvas) {
    const comp = document.getElementById('f-comp').value.trim();
    downloadCard(createdCanvas, (comp?comp.toLowerCase().replace(/\s+/g,'-'):'workspace')+'-card.png');
    toast('Card downloaded.', 'toast-ok');
  }
};
window.waCard = () => {
  if (createdCanvas) {
    const comp = document.getElementById('f-comp').value.trim();
    shareCardWhatsApp(createdCanvas, comp ? comp+' access card' : 'Zenda card');
  }
};

/* ── OTP box logic ─────────────────────────────────────── */
function setupBoxes() {
  const boxes = [...document.querySelectorAll('#otp-row .otp-box')];
  boxes.forEach((b, i) => {
    b.value = ''; b.classList.remove('filled');
    b.oninput = () => {
      b.value = b.value.replace(/\D/g,'').slice(-1);
      b.classList.toggle('filled', !!b.value);
      if (b.value && i < boxes.length-1) boxes[i+1].focus();
    };
    b.onkeydown = (e) => {
      if (e.key==='Backspace' && !b.value && i>0) {
        boxes[i-1].focus(); boxes[i-1].value=''; boxes[i-1].classList.remove('filled');
      }
    };
    b.onpaste = (e) => {
      e.preventDefault();
      const d = e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);
      d.split('').forEach((c,j) => { if (boxes[j]) { boxes[j].value=c; boxes[j].classList.add('filled'); }});
      if (d.length===6) handleVerify();
    };
  });
  setTimeout(() => boxes[0]?.focus(), 120);
}
function getOTP()    { return [...document.querySelectorAll('#otp-row .otp-box')].map(b=>b.value).join(''); }
function clearBoxes(){ [...document.querySelectorAll('#otp-row .otp-box')].forEach(b=>{b.value='';b.classList.remove('filled');}); document.querySelector('#otp-row .otp-box')?.focus(); }

/* ── Timer ─────────────────────────────────────────────── */
function startTimer() {
  if (timerID) clearInterval(timerID);
  let s = 60;
  const tv=document.getElementById('timer-val'), tt=document.getElementById('timer-txt'), rb=document.getElementById('resend-btn');
  tt.style.display='inline'; rb.style.display='none'; tv.textContent=s+'s';
  timerID = setInterval(() => {
    tv.textContent=(--s)+'s';
    if (s<=0) { clearInterval(timerID); tt.style.display='none'; rb.style.display='inline'; }
  }, 1000);
}

/* ── Button loader ─────────────────────────────────────── */
function btnLoad(btn, loading, label) {
  if (!btn) return;
  if (loading) { btn.disabled=true; btn.dataset.lbl=btn.innerHTML; btn.innerHTML='<span class="spinner"></span>'; }
  else { btn.disabled=false; btn.innerHTML=label||btn.dataset.lbl||'Submit'; }
}

/* ── Toast ─────────────────────────────────────────────── */
function toast(msg, cls='toast-info') {
  const a = document.getElementById('toast-anchor');
  const icons = {
    'toast-ok': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    'toast-err': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    'toast-info': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
  };
  const t = document.createElement('div');
  t.className = `toast ${cls}`;
  t.innerHTML = `${icons[cls]||''} <span style="font-size:.88rem;font-weight:600">${msg}</span>`;
  a.appendChild(t);
  setTimeout(() => { t.style.cssText='opacity:0;transform:translateX(16px);transition:all .3s'; setTimeout(()=>t.remove(),300); }, 3800);
}

/* ── Enter key shortcut ────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('view1').style.display !== 'none') handleStep1();
  else if (document.getElementById('view2').style.display !== 'none') handleVerify();
});

</script>
</body>
</html>
