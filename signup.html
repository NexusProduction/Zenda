<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Create Workspace — Zenda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234F46E5'/><text x='50' y='72' font-family='Arial, sans-serif' font-size='68' font-weight='bold' fill='white' text-anchor='middle'>Z</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  --bg:#F3F4F6;--sf:#FFFFFF;--sf2:#F8FAFC;--bd:#E2E8F0;--bd2:#CBD5E1;
  --tx1:#0F172A;--tx2:#475569;--tx3:#64748B;
  --ac:#4F46E5;--ach:#4338CA;
  --green:#10B981;--red:#EF4444;--amber:#F59E0B;
  --fd:'Plus Jakarta Sans',system-ui,sans-serif;
  --fb:'DM Sans',system-ui,sans-serif;
  --fm:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;-webkit-font-smoothing:antialiased;}

/* PAGE LAYOUT - Highly optimized for vertical space to remove scrollbar */
.page-wrap{display:grid;grid-template-columns:42% 58%;max-width:1050px;width:100%;background:var(--sf);border-radius:28px;box-shadow:0 20px 60px rgba(15,23,42,.08);overflow:hidden; height:min(640px, 92vh); border:1px solid rgba(0,0,0,0.05);}

/* LEFT PANEL (STATIC 3D VISUAL) */
.left-visual{
    background:linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
    position:relative;
    display:flex;align-items:center;justify-content:center;
    border-right:1px solid rgba(0,0,0,0.04);
    overflow:hidden;
}

/* Background Crossing Lines */
.crossing-lines {
    position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
}

/* Premium 3D "Cartoonish" Assets */
.logo-3d {
    width: 90px; height: 90px;
    background: var(--ac);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 44px; font-family: var(--fd); font-weight: 800;
    box-shadow: 0 20px 40px rgba(79,70,229,0.35), inset 0 4px 10px rgba(255,255,255,0.3), inset 0 -4px 10px rgba(0,0,0,0.15);
    z-index: 10; position:relative;
}

.float-card {
    position: absolute;
    background: #FFFFFF;
    border-radius: 20px;
    box-shadow: 0 16px 32px rgba(15,23,42,0.06), inset 0 2px 4px rgba(255,255,255,0.8);
    padding: 16px;
    z-index: 5;
    border: 1px solid rgba(255,255,255,0.6);
}

.card-tasks {
    top: 22%; left: 15%;
    transform: rotate(-6deg);
    width: 120px;
}
.card-tasks .check-icon {
    width: 28px; height: 28px; background: #10B981; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(16,185,129,0.3); font-weight:bold; font-size: 14px;
}
.card-tasks .line { height: 6px; background: #E2E8F0; border-radius: 4px; margin-bottom: 8px; width: 100%; }
.card-tasks .line.short { width: 60%; margin-bottom: 0;}

.card-chart {
    bottom: 22%; right: 15%;
    transform: rotate(5deg);
    width: 140px;
    display: flex; align-items: flex-end; gap: 8px; height: 90px;
}
.card-chart .bar {
    flex: 1; background: #C7D2FE; border-radius: 6px 6px 4px 4px;
}
.card-chart .bar.active { background: #4F46E5; box-shadow: 0 4px 10px rgba(79,70,229,0.2); }

/* RIGHT PANEL (FORM) */
.right-form{padding:40px 56px;display:flex;flex-direction:column;justify-content:center;background:var(--sf);overflow-y:auto;position:relative;}

/* COMPACT STEPS INDICATOR */
.steps{display:flex;align-items:center;gap:0;margin-bottom:28px; max-width: 320px; width:100%; margin-left:auto; margin-right:auto;}
.step-item{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;position:relative}
.step-item::after{content:'';position:absolute;top:12px;left:50%;width:100%;height:3px;background:var(--sf2);z-index:0; border-radius:3px;}
.step-item:last-child::after{display:none}
.step-item.done::after{background:var(--ac)}
.step-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;font-family:var(--fd);color:var(--tx3);background:var(--sf);position:relative;z-index:1; transition:all 0.3s;}
.step-item.active .step-dot{border-color:var(--ac);color:var(--ac);background:#EEF2FF; transform:scale(1.15);}
.step-item.done .step-dot{border-color:var(--ac);background:var(--ac);color:#fff}
.step-lbl{font-size:.65rem;color:var(--tx3);font-weight:700;white-space:nowrap; text-transform:uppercase; letter-spacing:0.04em;}
.step-item.active .step-lbl{color:var(--tx1);}
.step-item.done .step-lbl{color:var(--ac)}

.form-ttl{font-family:var(--fd);font-size:1.8rem;font-weight:800;color:var(--tx1);letter-spacing:-.03em;margin-bottom:4px}
.form-sub{font-size:.85rem;color:var(--tx2);margin-bottom:24px; font-weight:500;}
.form-sub a{color:var(--ac);font-weight:700; text-decoration:underline; text-underline-offset:2px;}

/* FORMS - Vertically Optimized */
.fblock{display:flex;flex-direction:column;gap:16px} 
.frow{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:500px){.frow{grid-template-columns:1fr}}
.fgrp{display:flex;flex-direction:column;gap:6px}
.flbl{font-family:var(--fd);font-size:.8rem;font-weight:700;color:var(--tx1);letter-spacing:.01em}
.finp{width:100%;padding:12px 14px;border:1.5px solid var(--bd);border-radius:10px;font-size:.9rem;outline:none;transition:all .15s;background:var(--bg);color:var(--tx1);font-family:var(--fb); font-weight:500;}
.finp:focus{background:var(--sf); border-color:var(--ac);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.finp::placeholder{color:var(--tx3); font-weight:400;}
.finp.err{border-color:var(--red)!important; background:#FEF2F2;}
.finp.err:focus{box-shadow:0 0 0 3px rgba(239,68,68,.12)}
.ferr{font-size:.7rem;color:var(--red);font-weight:600;min-height:12px;margin-top:-2px; display:none;}
.ferr.show{display:block;}

.pwrap{position:relative}.pwrap .finp{padding-right:40px}
.peye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--tx3);padding:4px;display:flex;align-items:center;justify-content:center;transition:color .15s;}
.peye:hover{color:var(--tx1)}

.pwd-bar-wrap{height:4px;border-radius:4px;background:var(--bd);margin-top:2px;overflow:hidden}
.pwd-bar{height:100%;border-radius:4px;width:0;transition:all .3s cubic-bezier(.34,1.56,.64,1)}

/* MAIN BUTTON */
.btnMain{width:100%;padding:14px;border-radius:10px;font-family:var(--fd);font-weight:700;font-size:.95rem;color:#fff;background:var(--ac);border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;box-shadow:0 4px 12px rgba(79,70,229,.2)}
.btnMain:hover{background:var(--ach);box-shadow:0 6px 16px rgba(79,70,229,.3);transform:translateY(-1px)}
.btnMain:active{transform:scale(.98)}

/* SUCCESS BUTTON ANIMATION */
.btn-success {
    background: linear-gradient(to right, #10B981 50%, var(--ac) 50%) !important;
    background-size: 200% 100% !important;
    background-position: right bottom !important;
    animation: slideGreen 0.4s forwards ease-out !important;
    color: white !important;
    border: none !important;
}
@keyframes slideGreen { to { background-position: left bottom; } }

/* OTP */
.otp-row{display:flex;gap:8px;justify-content:center;margin:16px 0}
.obox{width:46px;height:54px;text-align:center;font-family:var(--fm);font-size:1.3rem;font-weight:700;border:1.5px solid var(--bd);border-radius:10px;background:var(--bg);color:var(--tx1);outline:none;transition:all .18s}
.obox:focus{background:var(--sf);border-color:var(--ac);box-shadow:0 0 0 3px rgba(79,70,229,.1);transform:scale(1.05)}
.obox.on{border-color:var(--ac);background:#EEF2FF;color:var(--ac)}
.timer-row{text-align:center;font-size:.75rem;color:var(--tx3);margin-top:8px}
.timer-val{font-family:var(--fm);color:var(--tx1);font-weight:600}
.link-btn{background:none;border:none;color:var(--ac);font-size:.75rem;font-weight:700;cursor:pointer;font-family:var(--fb);text-decoration:underline;text-underline-offset:2px;}

.back-form{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;font-weight:700;color:var(--tx2);cursor:pointer;background:none;border:none;padding:0;margin-bottom:16px;font-family:var(--fb);transition:color .15s}
.back-form:hover{color:var(--ac)}

/* Success Step 3 */
.success-wrap{text-align:center}
.success-ico{width:64px;height:64px;border-radius:20px;background:#EEF2FF;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1); box-shadow:0 8px 16px rgba(79,70,229,0.15);}
@keyframes popIn{from{transform:scale(0) rotate(-15deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.code-box{background:var(--sf);border:1.5px dashed var(--bd2);border-radius:10px;padding:14px;margin:12px 0;cursor:pointer;transition:all .2s}
.code-box:hover{border-color:var(--ac);box-shadow:0 4px 16px rgba(15,23,42,.06); transform:translateY(-2px);}
.code-lbl{font-size:.65rem;font-weight:800;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;font-family:var(--fd)}
.code-val{font-family:var(--fm);font-size:1.6rem;color:var(--tx1);letter-spacing:.15em; font-weight:700;}
.code-hint{font-size:.7rem;color:var(--tx3);margin-top:4px; font-weight:500;}
.card-preview{margin:12px 0;border-radius:12px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.1); transition:transform .3s; border:1px solid var(--bd);}
.card-actions{display:flex;gap:12px;margin-top:8px}
.btn-dl{flex:1;padding:10px;background:var(--sf);border:1.5px solid var(--bd);border-radius:8px;color:var(--tx1);font-family:var(--fd);font-weight:700;font-size:.85rem;cursor:pointer;transition:all .18s; display:flex; align-items:center; justify-content:center; gap:6px;}
.btn-dl:hover{border-color:var(--tx1);background:#F3F4F6}
.btn-wa{flex:1;padding:10px;background:#10B981;border:none;border-radius:8px;color:#fff;font-family:var(--fd);font-weight:700;font-size:.85rem;cursor:pointer;transition:all .18s; display:flex; align-items:center; justify-content:center; gap:6px;}
.btn-wa:hover{background:#059669;}

/* Toasts */
#toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:10px;font-size:.85rem;font-weight:700;box-shadow:0 8px 32px rgba(0,0,0,.12);min-width:200px;animation:tIn .28s ease;border:1px solid;display:flex;align-items:center;gap:8px}
.t-ok{background:#0F172A;border-color:#334155;color:#fff}
.t-err{background:#FEF2F2;border-color:#FECACA;color:#991B1B}
.t-info{background:#EEF2FF;border-color:#C7D2FE;color:var(--tx1)}
@keyframes tIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
.spinner{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* MOBILE RESPONSIVENESS */
@media(max-width:860px) {
    body { padding:0; align-items:flex-end; background:#E0E7FF;}
    .page-wrap { grid-template-columns:1fr; border-radius:32px 32px 0 0; min-height:auto; border:none; box-shadow:0 -10px 40px rgba(0,0,0,0.1); max-width:100%; height:auto;}
    .left-visual { display:none; } 
    .right-form { padding:32px 24px 40px; border-radius:32px 32px 0 0; background:var(--sf); }
    .frow { grid-template-columns: 1fr; gap: 14px; }
}
</style>
</head>
<body>

<div class="page-wrap">
  <div class="left-visual">
      
      <svg class="crossing-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
          <path d="M-10,20 Q50,80 110,10" fill="none" stroke="rgba(79,70,229,0.15)" stroke-width="0.5" stroke-dasharray="2 2"/>
          <path d="M-10,80 Q50,10 110,90" fill="none" stroke="rgba(79,70,229,0.15)" stroke-width="0.5" stroke-dasharray="2 2"/>
          <path d="M20,-10 Q80,50 10,110" fill="none" stroke="rgba(79,70,229,0.1)" stroke-width="0.5" stroke-dasharray="2 2"/>
      </svg>

      <div class="float-card card-tasks">
          <div class="check-icon">✓</div>
          <div class="line"></div>
          <div class="line"></div>
          <div class="line short"></div>
      </div>

      <div class="float-card card-chart">
          <div class="bar" style="height:40%"></div>
          <div class="bar" style="height:70%"></div>
          <div class="bar active" style="height:100%"></div>
          <div class="bar" style="height:50%"></div>
      </div>

      <div class="logo-3d">Z</div>
      
  </div>

  <div class="right-form">
    <div class="steps" id="steps">
      <div class="step-item active" id="step1"><div class="step-dot">1</div><div class="step-lbl">Account</div></div>
      <div class="step-item" id="step2"><div class="step-dot">2</div><div class="step-lbl">Verify</div></div>
      <div class="step-item" id="step3"><div class="step-dot">3</div><div class="step-lbl">Done</div></div>
    </div>

    <div id="v-step1">
      <div class="form-ttl" style="display:flex; align-items:center; gap:12px;">
        <button onclick="window.location.href='index.html'" style="background:none; border:none; cursor:pointer; color:var(--tx1); display:flex; align-items:center; padding:0; transition:color 0.2s;" onmouseover="this.style.color='#4F46E5'" onmouseout="this.style.color='var(--tx1)'" title="Back to Home">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        Create workspace
      </div>
      <p class="form-sub">Setup your team in seconds. <a href="login.html">Sign in instead</a></p>
      
      <div class="fblock">
        
        <div class="frow">
          <div class="fgrp">
            <label class="flbl">Company Name</label>
            <input class="finp" id="comp-name" type="text" placeholder="Acme Corp" maxlength="50" oninput="clrErr('comp-name')">
            <div class="ferr" id="e-comp-name"></div>
          </div>
          <div class="fgrp">
            <label class="flbl">Your Full Name</label>
            <input class="finp" id="owner-name" type="text" placeholder="John Doe" maxlength="40" oninput="clrErr('owner-name')">
            <div class="ferr" id="e-owner-name"></div>
          </div>
        </div>
        
        <div class="fgrp">
            <label class="flbl">Email Address</label>
            <input class="finp" id="reg-email" type="email" autocomplete="email" placeholder="you@company.com" oninput="clrErr('reg-email')">
            <div class="ferr" id="e-reg-email"></div>
        </div>
        
        <div class="frow">
            <div class="fgrp">
                <label class="flbl">Password</label>
                <div class="pwrap">
                    <input class="finp" id="reg-pwd" type="password" autocomplete="current-password" placeholder="Min 6 chars" oninput="clrErr('reg-pwd');updateStr(this.value)">
                    <button class="peye" onclick="toggleEye('reg-pwd',this)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <div class="pwd-bar-wrap"><div class="pwd-bar" id="pwd-bar"></div></div>
                <div class="ferr" id="e-reg-pwd"></div>
            </div>
            
            <div class="fgrp">
                <label class="flbl">Confirm Password</label>
                <div class="pwrap">
                    <input class="finp" id="reg-pwd2" type="password" autocomplete="current-password" placeholder="Re-enter" oninput="clrErr('reg-pwd2')">
                    <button class="peye" onclick="toggleEye('reg-pwd2',this)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <div class="ferr" id="e-reg-pwd2"></div>
            </div>
        </div>
        
        <button class="btnMain" id="btn-step1" onclick="handleStep1()">Send OTP to Email</button>
        <p style="font-size:.7rem;color:var(--tx3);text-align:center; font-weight:500;">By signing up you agree to our <a href="#" style="color:var(--tx1);text-decoration:underline;text-underline-offset:2px;">Terms & Conditions</a></p>
      </div>
    </div>

    <div id="v-step2" style="display:none">
      <button class="back-form" onclick="showStep(1)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Change email
      </button>
      <div style="text-align:center;margin-bottom:4px">
        <div style="width:64px;height:64px;background:#EEF2FF;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px; box-shadow:0 8px 16px rgba(79,70,229,0.1);">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div class="form-ttl" style="margin-bottom:4px;">Verify email</div>
        <div style="font-size:.85rem;color:var(--tx2);line-height:1.5;font-weight:500">6-digit code sent to <br><strong style="color:var(--tx1)" id="otp-email-show"></strong></div>
      </div>
      <div class="otp-row" id="otp-row">
        <input class="obox" maxlength="1" inputmode="numeric"><input class="obox" maxlength="1" inputmode="numeric"><input class="obox" maxlength="1" inputmode="numeric"><input class="obox" maxlength="1" inputmode="numeric"><input class="obox" maxlength="1" inputmode="numeric"><input class="obox" maxlength="1" inputmode="numeric">
      </div>
      <button class="btnMain" id="btn-verify" onclick="handleVerify()">Create Workspace</button>
      <div class="timer-row"><span id="timer-txt">Resend in <strong class="timer-val" id="timer-val">60s</strong></span><button class="link-btn" id="resend-btn" onclick="resendOTP()" style="display:none">Resend OTP</button></div>
    </div>

    <div id="v-step3" style="display:none">
      <div class="success-wrap">
        <div class="success-ico">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="form-ttl" style="margin-bottom:4px;">Workspace Live!</div>
        <div style="font-size:.85rem;color:var(--tx2);margin-bottom:16px;font-weight:500">Your company is ready. Keep this code secure.</div>
        
        <div class="code-box" id="code-box" onclick="copyCode()">
          <div class="code-lbl">Master Company Code</div>
          <div class="code-val" id="code-val">—</div>
          <div class="code-hint">Click to copy</div>
        </div>
        
        <div id="company-card-container" class="card-preview"></div>
        
        <div class="card-actions">
          <button class="btn-dl" onclick="dlCard()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
          </button>
          <button class="btn-wa" onclick="waCard()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            WhatsApp
          </button>
        </div>
        <button class="btnMain" onclick="window.location.href='dashboard.html'" style="margin-top:16px">Go to Dashboard →</button>
      </div>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script type="module">
import{auth,db,EMAILJS_CONFIG}from'./firebase-config.js';
import{ownerSignUp}from'./auth.js';
import{sendOTP,verifyUserOTP}from'./otp.js';
import{renderCardToElement,downloadCard,shareCardWhatsApp}from'./card-generator.js';
import{isValidEmail}from'./utils.js';

if(EMAILJS_CONFIG.publicKey&&EMAILJS_CONFIG.publicKey!=='YOUR_EMAILJS_PUBLIC_KEY'){try{emailjs.init({publicKey: EMAILJS_CONFIG.publicKey});}catch(e){console.error("EmailJS Init Error:", e);}}
let createdCanvas=null,createdCode='',timerID=null;

window.showStep = function(n){
    [1,2,3].forEach(i=>{
        document.getElementById('v-step'+i).style.display=i===n?'block':'none';
        const s=document.getElementById('step'+i);
        s.className='step-item'+(i<n?' done':i===n?' active':'');
        s.querySelector('.step-dot').innerHTML=i<n?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':i;
    });
};

window.toggleEye=(id,btn)=>{
    const inp=document.getElementById(id);
    inp.type=inp.type==='password'?'text':'password';
    if(inp.type==='text'){
        btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    } else {
        btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }
};

window.clrErr=id=>{document.getElementById(id)?.classList.remove('err');const e=document.getElementById('e-'+id);if(e){e.textContent='';e.classList.remove('show');}};
function showErr(id,msg){document.getElementById(id)?.classList.add('err');const e=document.getElementById('e-'+id);if(e){e.textContent=msg;e.classList.add('show');}}
function clearAllErrs(){document.querySelectorAll('.finp.err').forEach(e=>e.classList.remove('err'));document.querySelectorAll('.ferr.show').forEach(e=>{e.textContent='';e.classList.remove('show');});}

window.updateStr=pwd=>{
    const bar=document.getElementById('pwd-bar');
    if(!pwd){bar.style.width='0';return;}
    let s=0;
    if(pwd.length>=6)s++;
    if(pwd.length>=10)s++;
    if(/[A-Z]/.test(pwd))s++;
    if(/\d/.test(pwd))s++;
    if(/[^A-Za-z0-9]/.test(pwd))s++;
    const w=['0%','20%','42%','62%','82%','100%'];
    const c=['','#EF4444','#F59E0B','#3B82F6','#10B981','#059669'];
    bar.style.width=w[s];
    bar.style.background=c[s];
};

window.handleStep1=async()=>{
  clearAllErrs();
  const comp=document.getElementById('comp-name').value.trim();
  const owner=document.getElementById('owner-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pwd=document.getElementById('reg-pwd').value;
  const pwd2=document.getElementById('reg-pwd2').value;
  let ok=true;
  
  if(!comp){showErr('comp-name','Req.');ok=false;}
  if(!owner){showErr('owner-name','Req.');ok=false;}
  if(!email){showErr('reg-email','Req.');ok=false;}else if(!isValidEmail(email)){showErr('reg-email','Invalid.');ok=false;}
  if(!pwd){showErr('reg-pwd','Req.');ok=false;}else if(pwd.length<6){showErr('reg-pwd','Min 6.');ok=false;}
  if(pwd!==pwd2){showErr('reg-pwd2','Mismatch.');ok=false;}
  
  if(!ok)return;
  const btn=document.getElementById('btn-step1');
  btnLoad(btn,true);
  
  try{
      await sendOTP(email,owner,comp);
      document.getElementById('otp-email-show').textContent=email;
      
      btn.classList.add('btn-success');
      btn.innerHTML = 'Success ✓';
      
      setTimeout(() => {
          btn.classList.remove('btn-success');
          btnLoad(btn,false,'Send OTP to Email');
          showStep(2);
          setupBoxes();
          startTimer();
      }, 450);
      
      toast('Security code sent!','info');
  } catch(e) {
      toast('Error: '+e.message,'err');
      btnLoad(btn,false,'Send OTP to Email');
  }
};

window.handleVerify=async()=>{
  const otp=getOTPVal();if(otp.length!==6){toast('Enter 6 digits.','err');return;}
  const btn=document.getElementById('btn-verify');
  btnLoad(btn,true);
  
  try{
      const r=await verifyUserOTP(document.getElementById('reg-email').value.trim(),otp);
      if(!r.success){toast(r.message,'err');clearBoxes();btnLoad(btn,false,'Create Workspace');return;}
      
      const comp=document.getElementById('comp-name').value.trim();
      const owner=document.getElementById('owner-name').value.trim();
      const email=document.getElementById('reg-email').value.trim();
      const pwd=document.getElementById('reg-pwd').value;
      
      const data=await ownerSignUp(comp,owner,email,pwd);
      createdCode=data.uniqueCode;
      
      btn.classList.add('btn-success');
      btn.innerHTML = 'Verified ✓';
      
      setTimeout(() => {
          showStep(3);
          document.getElementById('code-val').textContent=data.uniqueCode.slice(0,4)+'-'+data.uniqueCode.slice(4);
          createdCanvas=renderCardToElement('company-card-container','company',{companyName:comp,ownerName:owner,email,uniqueCode:data.uniqueCode});
      }, 400);
      
      toast('Workspace created! 🎉','ok');
  } catch(e) {
      toast('Error: '+e.message,'err');
      btnLoad(btn,false,'Create Workspace');
  }
};

window.resendOTP=async()=>{try{await sendOTP(document.getElementById('reg-email').value.trim());clearBoxes();startTimer();toast('New OTP sent!','info');}catch(e){toast('Failed.','err');}};
window.copyCode=()=>{navigator.clipboard.writeText(createdCode).then(()=>{const b=document.getElementById('code-box');b.style.background='#F3F4F6';b.style.borderColor='var(--tx1)';setTimeout(()=>{b.style.background='';b.style.borderColor='';},1200);toast('Code copied!','ok');});};
window.dlCard=()=>{if(createdCanvas){downloadCard(createdCanvas,document.getElementById('comp-name').value+'-zenda-card.png');toast('Downloaded!','ok');}};
window.waCard=()=>{if(createdCanvas)shareCardWhatsApp(createdCanvas,document.getElementById('comp-name').value+'-zenda-card');};

function setupBoxes(){const boxes=document.querySelectorAll('#otp-row .obox');boxes.forEach((box,i)=>{box.value='';box.classList.remove('on');box.oninput=()=>{box.value=box.value.replace(/\D/g,'').slice(-1);box.classList.toggle('on',!!box.value);if(box.value&&i<boxes.length-1)boxes[i+1].focus();};box.onkeydown=e=>{if(e.key==='Backspace'&&!box.value&&i>0){boxes[i-1].focus();boxes[i-1].value='';boxes[i-1].classList.remove('on');}};box.onpaste=e=>{e.preventDefault();const p=e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);p.split('').forEach((c,j)=>{if(boxes[j]){boxes[j].value=c;boxes[j].classList.add('on');}});if(p.length===6)handleVerify();};});setTimeout(()=>boxes[0]?.focus(),80);}
function getOTPVal(){return Array.from(document.querySelectorAll('#otp-row .obox')).map(b=>b.value).join('');}
function clearBoxes(){document.querySelectorAll('#otp-row .obox').forEach(b=>{b.value='';b.classList.remove('on');});document.querySelector('#otp-row .obox')?.focus();}
function startTimer(){if(timerID)clearInterval(timerID);let s=60;const tv=document.getElementById('timer-val'),tt=document.getElementById('timer-txt'),rb=document.getElementById('resend-btn');tt.style.display='inline';rb.style.display='none';tv.textContent=s+'s';timerID=setInterval(()=>{s--;tv.textContent=s+'s';if(s<=0){clearInterval(timerID);tt.style.display='none';rb.style.display='inline';}},1000);}

function btnLoad(btn,loading,label){if(!btn)return;if(loading){btn.disabled=true;btn.dataset.lbl=btn.innerHTML;btn.innerHTML='<span class="spinner"></span>';}else{btn.disabled=false;btn.innerHTML=label||btn.dataset.lbl;}}
function toast(msg,type='info'){const c=document.getElementById('toasts');const t=document.createElement('div');t.className='toast t-'+type;
let icon = 'ℹ️'; if(type==='ok') icon='✓'; if(type==='err') icon='⚠️';
t.innerHTML = `<span style="font-size:14px">${icon}</span> ${msg}`;
c.appendChild(t);setTimeout(()=>t.remove(),3500);}

// Enter key support
document.addEventListener('keydown',e=>{ 
  if(e.key!=='Enter') return; 
  const s1 = document.getElementById('v-step1');
  const s2 = document.getElementById('v-step2');
  if(s1.style.display !== 'none') window.handleStep1();
  else if(s2.style.display !== 'none') window.handleVerify();
});
</script>
</body>
</html>
