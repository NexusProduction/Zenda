<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Recovery Tool — Zenda</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F5F5F7; color: #1D1D1F; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 24px 48px rgba(0,0,0,0.1); width: 100%; max-width: 440px; border: 1px solid #E5E5EA; }
    h2 { margin: 0 0 8px; color: #0066CC; font-weight: 800; font-size: 1.8rem; }
    p { color: #86868B; font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5; }
    .input-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.85rem; font-weight: 700; color: #86868B; margin-bottom: 8px; }
    input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid #E5E5EA; background: #F5F5F7; font-family: inherit; font-size: 1rem; font-weight: 600; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #0066CC; background: white; }
    button { width: 100%; padding: 16px; background: #0066CC; color: white; border: none; border-radius: 14px; font-size: 1.05rem; font-weight: 700; cursor: pointer; margin-top: 12px; transition: transform 0.2s, box-shadow 0.2s; font-family: inherit; }
    button:hover { background: #0055B3; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0, 102, 204, 0.3); }
    #status { margin-top: 20px; font-weight: 700; text-align: center; border-radius: 12px; padding: 12px; display: none; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Zenda Emergency Recovery</h2>
    <p>Your database collections were deleted. Enter your details below to instantly rebuild your Owner Profile and Company.</p>
    
    <div class="input-group">
      <label>Your Firebase Auth UID (Paste from Firebase Console)</label>
      <input type="text" id="uid" placeholder="e.g. xY7bZ9...">
    </div>
    
    <div class="input-group">
      <label>Your Full Name</label>
      <input type="text" id="name" placeholder="John Doe">
    </div>

    <div class="input-group">
      <label>Your Login Email</label>
      <input type="email" id="email" placeholder="john@example.com">
    </div>

    <div class="input-group">
      <label>Your Company Name</label>
      <input type="text" id="company" placeholder="Zenda Tech">
    </div>

    <button id="recoverBtn" onclick="runRecovery()">Rebuild Database</button>
    <div id="status"></div>
  </div>

  <script type="module">
    import { db } from './firebase-config.js';
    import { doc, setDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    window.runRecovery = async function() {
      const uid = document.getElementById('uid').value.trim();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const compName = document.getElementById('company').value.trim();
      const btn = document.getElementById('recoverBtn');
      const status = document.getElementById('status');

      if (!uid || !name || !email || !compName) {
        alert("Please fill out all fields first!");
        return;
      }

      btn.textContent = "Rebuilding...";
      btn.disabled = true;
      status.style.display = 'none';

      try {
        // 1. Create a new Company Document
        const newCompanyRef = doc(collection(db, 'companies'));
        
        // Give you lifetime premium automatically to fix the UI
        let expiryDate = new Date();
        expiryDate.setFullYear(expiryDate.getFullYear() + 100); 

        await setDoc(newCompanyRef, {
          name: compName,
          ownerId: uid,
          createdAt: Date.now(),
          isPremium: true,
          planType: 'Lifetime',
          subscriptionTier: 'Premium Master',
          subscriptionExpiry: expiryDate.toISOString(),
          staffCount: 1
        });

        // 2. Recreate your User Profile and link it to the Company
        const uniqueId = 'Z' + Math.floor(100000 + Math.random() * 900000);
        
        await setDoc(doc(db, 'users', uid), {
          name: name,
          email: email,
          role: 'owner',
          companyId: newCompanyRef.id,
          companyName: compName,
          uniqueId: uniqueId,
          createdAt: Date.now()
        });

        // 3. Success!
        status.style.display = 'block';
        status.style.background = '#F2FDF4';
        status.style.color = '#34C759';
        status.style.border = '1px solid #34C759';
        status.textContent = "✅ Database successfully rebuilt!";
        
        btn.textContent = "Go to Dashboard ->";
        btn.onclick = () => window.location.href = 'dashboard.html';
        btn.disabled = false;

      } catch (error) {
        console.error(error);
        status.style.display = 'block';
        status.style.background = '#FFF2F2';
        status.style.color = '#FF3B30';
        status.style.border = '1px solid #FF3B30';
        status.textContent = "❌ Error: " + error.message;
        btn.textContent = "Try Again";
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
