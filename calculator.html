<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Calculator — Zenda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='12' fill='%236D28D9'/%3E%3Ccircle cx='9' cy='8' r='2.5' fill='white'/%3E%3Ccircle cx='15' cy='8' r='2.5' fill='white'/%3E%3Cline x1='4' y1='13' x2='20' y2='13' stroke='white' stroke-width='2.5' stroke-linecap='round'/%3E%3Ccircle cx='12' cy='18' r='2' fill='white'/%3E%3C/svg%3E">
<style>
:root{--bg:#F4F5F8;--sf:#FFFFFF;--sf2:#F3F4F6;--bd:#E5E7EB;--tx1:#111827;--tx2:#6B7280;--tx3:#9CA3AF;--ac:#4F46E5;--ach:#4338CA;--green:#10B981;--red:#EF4444;--fd:'Plus Jakarta Sans',system-ui,sans-serif;--fb:'DM Sans',system-ui,sans-serif;--fm:'DM Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);min-height:100vh;display:flex;flex-direction:column;font-family:var(--fb);-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* ── APPBAR STYLES ── */
.appbar{background:#FFFFFF;border-bottom:1px solid var(--bd);height:64px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100;}
.ab-left{display:flex;align-items:center;gap:12px;}
.ab-back{background:#FFFFFF;border:1px solid var(--bd);cursor:pointer;color:#374151;display:flex;align-items:center;gap:6px;font-family:var(--fd);font-weight:600;font-size:.9rem;transition:all .15s;padding:8px 14px;border-radius:8px;}
.ab-back svg { width: 16px; height: 16px; stroke-width: 2.5; stroke: currentColor; }
.ab-back:hover{background:#F9FAFB; border-color: #D1D5DB;}
.ab-divider{width:1px;height:24px;background:var(--bd);margin:0 4px;}
.ab-brand{display:flex;align-items:center;gap:12px;font-family:var(--fd);font-weight:700;font-size:1.1rem;color:#111827;}
.ab-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;overflow:hidden;}
.ab-title{white-space:nowrap;}

/* Right Side Actions */
.ab-right{display:flex;align-items:center;gap:12px;}
.ab-history-btn{display:flex;background:none;border:none;color:var(--tx2);width:38px;height:38px;align-items:center;justify-content:center;cursor:pointer;border-radius:10px;transition:all 0.15s;border:1.5px solid var(--bd);}
.ab-history-btn:hover{background:var(--sf2);color:var(--tx1);}

/* Sync Status Pill */
.ab-sync{display:flex;align-items:center;gap:6px;font-size:.8rem;font-family:var(--fd);font-weight:600;padding:6px 14px;border-radius:24px;transition:all 0.3s ease; background:var(--sf2); color:var(--tx3); border:1px solid transparent;}
.ab-sync.synced { color:#059669; background:#ECFDF5; border:1px solid #A7F3D0; }
.sync-indicator { width:8px; height:8px; border-radius:50%; background:currentColor; flex-shrink:0; }

/* WRAPPER */
.calc-wrapper{flex:1;display:flex;align-items:flex-start;justify-content:center;gap:30px;padding:32px 20px;flex-wrap:wrap}

/* ── WHITE THEME CALCULATOR ── */
.calculator{background:#FFFFFF;border-radius:36px;box-shadow:0 12px 40px rgba(0,0,0,0.08);overflow:hidden;width:340px;flex-shrink:0;display:flex;flex-direction:column;padding:24px 20px; border:1px solid var(--bd);}
.calc-display{background:transparent;padding:10px 10px 20px;text-align:right;min-height:120px;display:flex;flex-direction:column;justify-content:flex-end;gap:8px;}
.calc-expression{font-family:var(--fm);font-size:1.1rem;color:#6B7280;min-height:24px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.calc-value{font-family:var(--fm);font-size:3.5rem;font-weight:600;color:#111827;letter-spacing:-0.03em;line-height:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.calc-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}

/* Circular White-Theme Buttons */
.calc-btn{aspect-ratio: 1/1; height:auto; border:none;border-radius:50%;font-family:var(--fm);font-size:1.5rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none; transition: all 0.15s;}
.calc-btn:active{transform: scale(0.92);}

.btn-num{background:#F3F4F6;color:#111827;}
.btn-num:hover{background:#E5E7EB;}

.btn-action{background:#E5E7EB;color:#374151; font-size:1.3rem;}
.btn-action:hover{background:#D1D5DB;}

.btn-op{background:var(--ac);color:#FFFFFF; font-size:1.8rem; box-shadow: 0 4px 14px rgba(79,70,229,0.25);}
.btn-op:hover{background:var(--ach);}

.btn-zero{grid-column:span 2; aspect-ratio:auto; border-radius:40px; justify-content:flex-start; padding-left:32px;}


/* ── HISTORY PANEL ── */
.history-panel{background:var(--sf);border-radius:24px;border:1px solid var(--bd);overflow:hidden;box-shadow:0 4px 16px rgba(17,24,39,.06);width:300px;flex-shrink:0;height:550px;display:flex;flex-direction:column}
.history-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 16px;border-bottom:1px solid var(--bd)}
.history-title{font-family:var(--fd);font-weight:700;font-size:1rem;color:var(--tx1)}
.history-clear{background:none;border:none;color:var(--tx3);font-size:.8rem;cursor:pointer;font-family:var(--fd);transition:color .15s;font-weight:600}
.history-clear:hover{color:var(--red)}
.history-list{overflow-y:auto;padding:12px;flex:1}
.history-item{padding:14px;border-radius:12px;margin-bottom:6px;cursor:pointer;transition:background .15s;border:1px solid transparent}
.history-item:hover{background:var(--sf2);border-color:var(--bd)}
.history-expr{font-family:var(--fm);font-size:.8rem;color:var(--tx3);margin-bottom:4px}
.history-result{font-family:var(--fm);font-size:1.2rem;font-weight:700;color:var(--tx1);letter-spacing:-.02em}
.history-empty{text-align:center;padding:50px 16px;color:var(--tx3);font-size:.9rem}

/* ── MOBILE OVERRIDES ── */
@media(max-width:680px){
  .appbar { padding: 0 16px; }
  
  .desktop-only { display: none !important; }
  .mobile-only { display: flex !important; }
  
  /* Hide divider, icon, and sync text */
  .ab-divider, .ab-icon, .ab-sync { display: none !important; }
  
  /* Center the title */
  .ab-brand { position: absolute; left: 50%; transform: translateX(-50%); gap:0;}
  
  /* Specifically hide history button on mobile */
  .ab-history-btn { display: none !important; }

  /* Calculator Form Factor */
  .calc-wrapper { padding: 24px 16px; align-items: stretch; flex-direction: column; }
  .calculator { width: 100%; flex: 1; max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; border-radius: 40px; padding: 24px 16px; }
  .calc-display { flex: 1; min-height: 120px; padding: 20px 10px 16px; }

  /* Hide History Panel completely on mobile */
  .history-panel { display: none; }
}

/* TOAST */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:11px 15px;border-radius:13px;font-family:var(--fb);font-size:.83rem;font-weight:500;box-shadow:0 8px 32px rgba(17,24,39,.1);min-width:200px;animation:tIn .25s ease;border:1px solid}
.toast-success{background:#F0FDF4;border-color:#BBF7D0;color:#166534}
@keyframes tIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div class="appbar">
  <div class="ab-left">
    <button class="ab-back" onclick="window.history.length>1?window.history.back():window.close()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Back
    </button>
    
    <div class="ab-divider"></div>
    <div class="ab-brand">
      <div class="ab-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32">
          <circle cx="12" cy="12" r="12" fill="#6D28D9"/>
          <circle cx="9" cy="8" r="2.5" fill="white"/>
          <circle cx="15" cy="8" r="2.5" fill="white"/>
          <line x1="4" y1="13" x2="20" y2="13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="12" cy="18" r="2" fill="white"/>
        </svg>
      </div>
      <span class="ab-title">Calculator</span>
    </div>
  </div>
  
  <div class="ab-right">
    <button class="ab-history-btn desktop-only" onclick="toggleHistory()" title="View History">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
    </button>
    
    <button id="globalUpgradeBtn" class="hidden" style="background: linear-gradient(135deg, #F59E0B, #D97706); color: white; border: none; padding: 0 12px; height: 32px; border-radius: 8px; font-weight: 600; font-size: 12px; display: none; align-items: center; gap: 6px; cursor: pointer; box-shadow: 0 2px 8px rgba(245,158,11,0.3);" onclick="window.location.href='subscription.html'">
      👑 Upgrade
    </button>
    
    <div class="ab-sync desktop-only" id="sync-status">
      <div class="sync-indicator"></div>
      <span class="sync-text">Connecting...</span>
    </div>
  </div>
</div>

<div class="calc-wrapper">
  <div class="calculator">
    <div class="calc-display">
      <div class="calc-expression" id="calc-expr"></div>
      <div class="calc-value" id="calc-display">0</div>
    </div>
    <div class="calc-buttons">
      <button class="calc-btn btn-action" id="btn-clear" onclick="calcClear()">AC</button>
      <button class="calc-btn btn-action" onclick="calcToggleSign()">+/−</button>
      <button class="calc-btn btn-action" onclick="calcPercent()">%</button>
      <button class="calc-btn btn-op" onclick="calcOp('÷')">÷</button>
      
      <button class="calc-btn btn-num" onclick="calcNum('7')">7</button>
      <button class="calc-btn btn-num" onclick="calcNum('8')">8</button>
      <button class="calc-btn btn-num" onclick="calcNum('9')">9</button>
      <button class="calc-btn btn-op" onclick="calcOp('×')">×</button>
      
      <button class="calc-btn btn-num" onclick="calcNum('4')">4</button>
      <button class="calc-btn btn-num" onclick="calcNum('5')">5</button>
      <button class="calc-btn btn-num" onclick="calcNum('6')">6</button>
      <button class="calc-btn btn-op" onclick="calcOp('−')">−</button>
      
      <button class="calc-btn btn-num" onclick="calcNum('1')">1</button>
      <button class="calc-btn btn-num" onclick="calcNum('2')">2</button>
      <button class="calc-btn btn-num" onclick="calcNum('3')">3</button>
      <button class="calc-btn btn-op" onclick="calcOp('+')">+</button>
      
      <button class="calc-btn btn-num btn-zero" onclick="calcNum('0')">0</button>
      <button class="calc-btn btn-num" onclick="calcDot()">.</button>
      <button class="calc-btn btn-op" onclick="calcEquals()">=</button>
    </div>
  </div>

  <div class="history-panel" id="history-panel">
    <div class="history-header">
      <div class="history-title">History</div>
      <button class="history-clear" onclick="clearHistory()">Clear all</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="history-empty">No calculations yet</div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { saveCalcHistory, loadCalcHistory } from './apps.js';
import { db } from './firebase-config.js'; 
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const uid = params.get('uid');

// --- CALCULATION LOGIC ---
let display = '0';
let expr = ''; 
let prevVal = null;
let currentOp = null;
let waitingForNewValue = false;
let history = [];

const displayEl = document.getElementById('calc-display');
const exprEl = document.getElementById('calc-expr');
const syncEl = document.getElementById('sync-status');
const btnClear = document.getElementById('btn-clear');

function updateDisplay() {
  // Trim length to prevent overflow
  let shown = display;
  if(shown.length > 11) shown = parseFloat(shown).toExponential(5);
  
  displayEl.textContent = shown;
  exprEl.textContent = expr;
  
  // Toggle AC / C based on state
  btnClear.textContent = (display === '0' && prevVal === null) ? 'AC' : 'C';
}

window.calcNum = function(n) {
  if (waitingForNewValue) {
      display = n;
      waitingForNewValue = false;
      // Clear the top equation if we start typing a brand new number after hitting '='
      if (currentOp === null) {
          expr = '';
      }
  } else {
      display = display === '0' ? n : display + n;
  }
  if (display.length > 11) display = display.substring(0, 11);
  updateDisplay();
};

window.calcDot = function() {
  if (waitingForNewValue) {
      display = '0.';
      waitingForNewValue = false;
      if (currentOp === null) {
          expr = '';
      }
  } else if (!display.includes('.')) {
      display += '.';
  }
  updateDisplay();
};

function performCalculation(a, op, b) {
  a = parseFloat(a);
  b = parseFloat(b);
  if (op === '+') return a + b;
  if (op === '−' || op === '-') return a - b;
  if (op === '×' || op === '*') return a * b;
  if (op === '÷' || op === '/') return b === 0 ? 'Error' : a / b;
  return b;
}

window.calcOp = function(op) {
  const curr = parseFloat(display);
  
  if (currentOp && !waitingForNewValue) {
      const result = performCalculation(prevVal, currentOp, curr);
      display = String(parseFloat(result.toFixed(10)));
      prevVal = result;
  } else {
      prevVal = curr;
  }
  
  currentOp = op;
  waitingForNewValue = true;
  
  // Keep the top expression hidden until '=' is pressed
  expr = '';
  updateDisplay();
};

window.calcEquals = function() {
  if (!currentOp || prevVal === null) return;
  
  const curr = parseFloat(display);
  const result = performCalculation(prevVal, currentOp, curr);
  const resultStr = result === 'Error' ? result : String(parseFloat(result.toFixed(10)));
  const fullExpr = `${prevVal} ${currentOp} ${curr} =`;

  // ONLY push the full line to the top text when Equal is pressed
  expr = fullExpr;
  display = resultStr; 
  
  prevVal = null;
  currentOp = null;
  waitingForNewValue = true;
  updateDisplay();

  if (resultStr !== 'Error') {
      history.push({ expr: fullExpr.replace(' =',''), result: resultStr, time: new Date().toISOString() });
      renderHistory();
      saveHistory();
  }
};

window.calcClear = function() {
  display = '0';
  expr = '';
  prevVal = null;
  currentOp = null;
  waitingForNewValue = false;
  updateDisplay();
};

window.calcToggleSign = function() {
  display = String(parseFloat(display) * -1);
  updateDisplay();
};

window.calcPercent = function() {
  display = String(parseFloat(display) / 100);
  updateDisplay();
};

// Keybindings
document.addEventListener('keydown',(e)=>{
  if(e.key>='0'&&e.key<='9') calcNum(e.key);
  else if(e.key==='.') calcDot();
  else if(e.key==='+') calcOp('+');
  else if(e.key==='-') calcOp('−');
  else if(e.key==='*') calcOp('×');
  else if(e.key==='/'){ e.preventDefault(); calcOp('÷'); }
  else if(e.key==='Enter'||e.key==='=') calcEquals();
  else if(e.key==='Escape' || e.key==='Backspace') calcClear();
});

// UI Status Helper
function setSyncStatus(status, isSynced) {
    if (!syncEl) return;
    syncEl.innerHTML = `<div class="sync-indicator"></div><span class="sync-text">${status}</span>`;
    if (isSynced) syncEl.classList.add('synced');
    else syncEl.classList.remove('synced');
}

async function checkPremiumStatus() {
  if (!uid) return;
  try {
    const uSnap = await getDoc(doc(db, 'users', uid));
    if (uSnap.exists()) {
      const compId = uSnap.data().companyId || uid;
      const compSnap = await getDoc(doc(db, 'companies', compId));
      let isPremium = false;
      if (compSnap.exists()) {
        const compData = compSnap.data();
        isPremium = compData.isPremium === true;
        if (isPremium && compData.subscriptionExpiry) {
          if (new Date() > new Date(compData.subscriptionExpiry)) isPremium = false;
        }
      }
      const upgBtn = document.getElementById('globalUpgradeBtn');
      if (upgBtn) {
        if (!isPremium) {
          upgBtn.classList.remove('hidden');
          upgBtn.style.display = 'flex';
        } else {
          upgBtn.classList.add('hidden');
          upgBtn.style.display = 'none';
        }
      }
    }
  } catch(e) { console.warn("Failed checking premium:", e); }
}

async function loadHistory() {
  if(!uid){ setSyncStatus('Not synced', false); return; }
  try{
    history=await loadCalcHistory(uid);
    renderHistory();
    setSyncStatus('Connected', true);
  } catch{
    setSyncStatus('Offline', false);
  }
}

async function saveHistory() {
  if(!uid) return;
  try{
    await saveCalcHistory(uid, history);
    setSyncStatus('Connected', true);
  } catch{
    setSyncStatus('Sync failed', false);
  }
}

function renderHistory() {
  const list=document.getElementById('history-list');
  if(!history.length){list.innerHTML='<div class="history-empty">No calculations yet</div>';return;}
  list.innerHTML=[...history].reverse().map((h,i)=>`<div class="history-item" onclick="restoreHistory(${history.length-1-i})"><div class="history-expr">${h.expr}</div><div class="history-result">${h.result}</div></div>`).join('');
}

window.restoreHistory=function(i){
    display=history[i].result.toString();
    waitingForNewValue=true;
    expr=''; // Clear expression on restore
    updateDisplay();
};

window.clearHistory=function(){history=[];renderHistory();saveHistory();};

// Toggle history on PC
window.toggleHistory = function() {
    const panel = document.getElementById('history-panel');
    if (panel.style.display === 'none') {
        panel.style.display = 'flex';
    } else {
        panel.style.display = 'none';
    }
};

// Initialization
checkPremiumStatus();
loadHistory();
updateDisplay();
</script>
</body>
</html>
