<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Calculator — Zenda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%230057C2'/%3E%3Crect x='5.5' y='4.5' width='13' height='15' rx='2' fill='none' stroke='white' stroke-width='1.5'/%3E%3Cline x1='8' y1='8' x2='16' y2='8' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3Ccircle cx='8.5' cy='12' r='1' fill='white'/%3E%3Ccircle cx='12' cy='12' r='1' fill='white'/%3E%3Ccircle cx='15.5' cy='12' r='1' fill='white'/%3E%3Ccircle cx='8.5' cy='15.5' r='1' fill='white'/%3E%3Ccircle cx='12' cy='15.5' r='1' fill='white'/%3E%3Ccircle cx='15.5' cy='15.5' r='1' fill='white'/%3E%3C/svg%3E">
<style>
:root{--bg:#F9FAFB;--sf:#FFFFFF;--sf2:#F3F4F6;--bd:#E5E7EB;--tx1:#111827;--tx2:#6B7280;--tx3:#9CA3AF;--ac:#4F46E5;--ach:#4338CA;--acs:rgba(79,70,229,.08);--green:#10B981;--red:#EF4444;--fd:'Plus Jakarta Sans',system-ui,sans-serif;--fb:'DM Sans',system-ui,sans-serif;--fm:'DM Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);min-height:100vh;display:flex;flex-direction:column;font-family:var(--fb);-webkit-font-smoothing:antialiased}

/* ── UPDATED APPBAR STYLES ── */
.appbar{background:#FFFFFF;border-bottom:1px solid var(--bd);height:64px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100;}
.ab-left{display:flex;align-items:center;gap:16px;}
.ab-back{background:#FFFFFF;border:1px solid var(--bd);cursor:pointer;color:#374151;display:flex;align-items:center;gap:6px;font-family:var(--fd);font-weight:600;font-size:.9rem;transition:all .15s;padding:8px 14px;border-radius:8px;}
.ab-back svg { width: 16px; height: 16px; stroke-width: 2.5; stroke: currentColor; }
.ab-back:hover{background:#F9FAFB; border-color: #D1D5DB;}
.ab-divider{width:1px;height:24px;background:var(--bd);}
.ab-brand{display:flex;align-items:center;gap:12px;font-family:var(--fd);font-weight:700;font-size:1.1rem;color:#111827;}
.ab-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;overflow:hidden;}

/* Updated Sync Status Pill */
.ab-sync{font-size:.8rem;font-family:var(--fd);font-weight:600;padding:6px 14px;border-radius:24px;transition:all 0.3s ease; background:var(--sf2); color:var(--tx3); border:1px solid transparent;}
.ab-sync.synced { color:#059669; background:#ECFDF5; border:1px solid #A7F3D0; }

/* WRAPPER */
.calc-wrapper{flex:1;display:flex;align-items:flex-start;justify-content:center;gap:20px;padding:32px 20px;flex-wrap:wrap}
/* CALCULATOR */
.calculator{background:var(--sf);border-radius:24px;border:1px solid var(--bd);box-shadow:0 8px 32px rgba(79,70,229,.08);overflow:hidden;width:320px;flex-shrink:0}
.calc-display{background:linear-gradient(135deg,#1E1B4B,#312E81,#4F46E5);padding:28px 24px 20px;text-align:right;min-height:110px;display:flex;flex-direction:column;justify-content:flex-end;gap:4px}
.calc-expression{font-family:var(--fm);font-size:.85rem;color:rgba(255,255,255,.5);min-height:20px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.calc-value{font-family:var(--fm);font-size:2.8rem;font-weight:700;color:white;letter-spacing:-.03em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.1}
.calc-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:18px}
.calc-btn{height:64px;border:none;border-radius:14px;font-family:var(--fm);font-size:1.2rem;font-weight:600;cursor:pointer;transition:all .12s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center;user-select:none}
.calc-btn:active{transform:scale(.91)!important}
.btn-num{background:var(--sf);border:1.5px solid var(--bd);color:var(--tx1);box-shadow:0 2px 6px rgba(17,24,39,.04)}
.btn-num:hover{background:var(--sf2);border-color:var(--bd);transform:translateY(-2px);box-shadow:0 4px 12px rgba(17,24,39,.07)}
.btn-op{background:#EEF2FF;border:1.5px solid #C7D2FE;color:var(--ac);font-size:1.35rem}
.btn-op:hover{background:var(--ac);color:white;transform:translateY(-2px);box-shadow:0 4px 12px rgba(79,70,229,.3)}
.btn-clear{background:#FEE2E2;border:1.5px solid #FECACA;color:var(--red)}
.btn-clear:hover{background:var(--red);color:white;transform:translateY(-2px)}
.btn-action{background:var(--sf2);border:1.5px solid var(--bd);color:var(--tx2)}
.btn-action:hover{background:var(--tx2);color:white;transform:translateY(-2px)}
.btn-eq{background:var(--ac);border:none;color:white;font-size:1.35rem;box-shadow:0 4px 12px rgba(79,70,229,.3)}
.btn-eq:hover{background:var(--ach);transform:translateY(-2px);box-shadow:0 6px 20px rgba(79,70,229,.38)}
.btn-zero{grid-column:span 2;justify-content:flex-start;padding-left:22px}
/* HISTORY */
.history-panel{background:var(--sf);border-radius:20px;border:1px solid var(--bd);overflow:hidden;box-shadow:0 2px 8px rgba(17,24,39,.05);width:280px;flex-shrink:0;max-height:500px;display:flex;flex-direction:column}
.history-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:1px solid var(--bd)}
.history-title{font-family:var(--fd);font-weight:700;font-size:.9rem;color:var(--tx1)}
.history-clear{background:none;border:none;color:var(--tx3);font-size:.78rem;cursor:pointer;font-family:var(--fb);transition:color .15s;font-weight:500}
.history-clear:hover{color:var(--red)}
.history-list{overflow-y:auto;padding:8px;flex:1}
.history-item{padding:11px 12px;border-radius:10px;margin-bottom:4px;cursor:pointer;transition:background .15s;border:1px solid transparent}
.history-item:hover{background:var(--sf2);border-color:var(--bd)}
.history-expr{font-family:var(--fm);font-size:.75rem;color:var(--tx3);margin-bottom:3px}
.history-result{font-family:var(--fm);font-size:1rem;font-weight:700;color:var(--tx1);letter-spacing:-.02em}
.history-empty{text-align:center;padding:40px 16px;color:var(--tx3);font-size:.85rem}
/* TOAST */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:11px 15px;border-radius:13px;font-family:var(--fb);font-size:.83rem;font-weight:500;box-shadow:0 8px 32px rgba(17,24,39,.1);min-width:200px;animation:tIn .25s ease;border:1px solid}
.toast-success{background:#F0FDF4;border-color:#BBF7D0;color:#166534}
.toast-error{background:#FFF5F5;border-color:#FECACA;color:#991B1B}
.toast-info{background:#EEF2FF;border-color:#C7D2FE;color:var(--ac)}
@keyframes tIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@media(max-width:680px){.calc-wrapper{padding:20px 16px}.history-panel{width:100%;max-height:300px}}
</style>
</head>
<body>
<div class="appbar">
  <div class="ab-left">
    <button class="ab-back" onclick="window.history.length>1?window.history.back():window.close()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Back
    </button>
    <div class="ab-divider"></div>
    <div class="ab-brand">
      <div class="ab-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32">
          <rect width="24" height="24" rx="6" fill="#0057C2"/>
          <rect x="5.5" y="4.5" width="13" height="15" rx="2" fill="none" stroke="white" stroke-width="1.5"/>
          <line x1="8" y1="8" x2="16" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="8.5" cy="12" r="1" fill="white"/>
          <circle cx="12" cy="12" r="1" fill="white"/>
          <circle cx="15.5" cy="12" r="1" fill="white"/>
          <circle cx="8.5" cy="15.5" r="1" fill="white"/>
          <circle cx="12" cy="15.5" r="1" fill="white"/>
          <circle cx="15.5" cy="15.5" r="1" fill="white"/>
        </svg>
      </div>
      Calculator
    </div>
  </div>
  <div class="ab-right" style="display: flex; align-items: center; gap: 12px;">
    <button id="globalUpgradeBtn" class="hidden" style="background: linear-gradient(135deg, #F59E0B, #D97706); color: white; border: none; padding: 0 12px; height: 32px; border-radius: 8px; font-weight: 600; font-size: 12px; display: none; align-items: center; gap: 6px; cursor: pointer; box-shadow: 0 2px 8px rgba(245,158,11,0.3);" onclick="window.location.href='subscription.html'">
      👑 Upgrade
    </button>
    <div class="ab-sync" id="sync-status">Connecting...</div>
  </div>
</div>

<div class="calc-wrapper">
  <div class="calculator">
    <div class="calc-display">
      <div class="calc-expression" id="calc-expr"></div>
      <div class="calc-value" id="calc-display">0</div>
    </div>
    <div class="calc-buttons">
      <button class="calc-btn btn-clear" onclick="calcClear()">AC</button>
      <button class="calc-btn btn-action" onclick="calcToggleSign()">+/−</button>
      <button class="calc-btn btn-action" onclick="calcPercent()">%</button>
      <button class="calc-btn btn-op" onclick="calcOp('÷')">÷</button>
      <button class="calc-btn btn-num" onclick="calcNum('7')">7</button>
      <button class="calc-btn btn-num" onclick="calcNum('8')">8</button>
      <button class="calc-btn btn-num" onclick="calcNum('9')">9</button>
      <button class="calc-btn btn-op" onclick="calcOp('×')">×</button>
      <button class="calc-btn btn-num" onclick="calcNum('4')">4</button>
      <button class="calc-btn btn-num" onclick="calcNum('5')">5</button>
      <button class="calc-btn btn-num" onclick="calcNum('6')">6</button>
      <button class="calc-btn btn-op" onclick="calcOp('−')">−</button>
      <button class="calc-btn btn-num" onclick="calcNum('1')">1</button>
      <button class="calc-btn btn-num" onclick="calcNum('2')">2</button>
      <button class="calc-btn btn-num" onclick="calcNum('3')">3</button>
      <button class="calc-btn btn-op" onclick="calcOp('+')">+</button>
      <button class="calc-btn btn-num btn-zero" onclick="calcNum('0')">0</button>
      <button class="calc-btn btn-num" onclick="calcDot()">.</button>
      <button class="calc-btn btn-eq" onclick="calcEquals()">=</button>
    </div>
  </div>

  <div class="history-panel">
    <div class="history-header">
      <div class="history-title">History</div>
      <button class="history-clear" onclick="clearHistory()">Clear all</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="history-empty">No calculations yet</div>
    </div>
  </div>
</div>
<div id="toast-container"></div>

<script type="module">
import { saveCalcHistory, loadCalcHistory } from './apps.js';
import { db } from './firebase-config.js'; 
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const uid = params.get('uid');

let display='0', expr='', operator=null, prevVal=null, newInput=false, history=[];
const displayEl=document.getElementById('calc-display');
const exprEl=document.getElementById('calc-expr');
const syncEl=document.getElementById('sync-status');

// 1. Checks if user is Premium to hide/show the Upgrade Button
async function checkPremiumStatus() {
  if (!uid) return;
  try {
    const uSnap = await getDoc(doc(db, 'users', uid));
    if (uSnap.exists()) {
      const compId = uSnap.data().companyId || uid;
      const compSnap = await getDoc(doc(db, 'companies', compId));
      let isPremium = false;
      if (compSnap.exists()) {
        const compData = compSnap.data();
        isPremium = compData.isPremium === true;
        if (isPremium && compData.subscriptionExpiry) {
          if (new Date() > new Date(compData.subscriptionExpiry)) isPremium = false;
        }
      }
      const upgBtn = document.getElementById('globalUpgradeBtn');
      if (upgBtn) {
        if (!isPremium) {
          upgBtn.classList.remove('hidden');
          upgBtn.style.display = 'flex';
        } else {
          upgBtn.classList.add('hidden');
          upgBtn.style.display = 'none';
        }
      }
    }
  } catch(e) { console.warn("Failed checking premium:", e); }
}

async function loadHistory() {
  if(!uid){syncEl.textContent='Not synced';return;}
  try{
    history=await loadCalcHistory(uid);
    renderHistory();
    syncEl.textContent='Connected';
    syncEl.classList.add('synced');
  } catch{
    syncEl.textContent='Offline';
    syncEl.classList.remove('synced');
  }
}

async function saveHistory() {
  if(!uid)return;
  try{
    await saveCalcHistory(uid,history);
    syncEl.textContent='Connected';
    syncEl.classList.add('synced');
  } catch{
    syncEl.textContent='Sync failed';
    syncEl.classList.remove('synced');
  }
}

function renderHistory() {
  const list=document.getElementById('history-list');
  if(!history.length){list.innerHTML='<div class="history-empty">No calculations yet</div>';return;}
  list.innerHTML=[...history].reverse().map((h,i)=>`<div class="history-item" onclick="restoreHistory(${history.length-1-i})"><div class="history-expr">${h.expr}</div><div class="history-result">${h.result}</div></div>`).join('');
}

window.restoreHistory=function(i){display=history[i].result.toString();newInput=true;updateDisplay();};
window.clearHistory=function(){history=[];renderHistory();saveHistory();};

function updateDisplay(val) {
  if(val!==undefined)display=val;
  let shown=display;
  if(shown.length>12)shown=parseFloat(shown).toExponential(4);
  displayEl.textContent=shown; exprEl.textContent=expr;
}

window.calcNum=function(n){if(newInput){display=n;newInput=false;}else{display=display==='0'?n:display+n;}if(display.length>14)return;updateDisplay();};
window.calcDot=function(){if(newInput){display='0.';newInput=false;}else if(!display.includes('.'))display+='.';updateDisplay();};
window.calcOp=function(op){prevVal=parseFloat(display);operator=op;expr=display+' '+op;newInput=true;updateDisplay();};
window.calcEquals=function(){
  if(operator===null||prevVal===null)return;
  const curr=parseFloat(display);
  const ops={'+':prevVal+curr,'−':prevVal-curr,'×':prevVal*curr,'÷':curr!==0?prevVal/curr:'Error'};
  const result=ops[operator];
  const fullExpr=`${prevVal} ${operator} ${curr}`;
  const resultStr=typeof result==='number'?parseFloat(result.toFixed(10)).toString():result;
  expr=fullExpr+' ='; display=resultStr; operator=null; prevVal=null; newInput=true; updateDisplay();
  if(result!=='Error'){history.push({expr:fullExpr,result:resultStr,time:new Date().toISOString()});renderHistory();saveHistory();}
};
window.calcClear=function(){display='0';expr='';operator=null;prevVal=null;newInput=false;updateDisplay();};
window.calcToggleSign=function(){display=(parseFloat(display)*-1).toString();updateDisplay();};
window.calcPercent=function(){display=(parseFloat(display)/100).toString();updateDisplay();};

document.addEventListener('keydown',(e)=>{
  if(e.key>='0'&&e.key<='9')calcNum(e.key);
  else if(e.key==='.')calcDot();
  else if(e.key==='+')calcOp('+');
  else if(e.key==='-')calcOp('−');
  else if(e.key==='*')calcOp('×');
  else if(e.key==='/'){e.preventDefault();calcOp('÷');}
  else if(e.key==='Enter'||e.key==='=')calcEquals();
  else if(e.key==='Escape')calcClear();
  else if(e.key==='Backspace'){display=display.length>1?display.slice(0,-1):'0';updateDisplay();}
});

// Run Init Functions
checkPremiumStatus();
loadHistory();
updateDisplay();
</script>
</body>
</html>
